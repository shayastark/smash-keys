  // Particle burst
  function spawnParticles(x, y, count) {
    const m = motionCalmFactor();
    const n = Math.floor(count * m * visualLoadScale());
    if (n < 1) return;
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i) / n + randBetween(-0.2, 0.2);
      const speed = randBetween(3, 12);
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      const radius = randBetween(4, 12);
      const color = randColor();
      let life = 1;
      const decay = randBetween(0.015, 0.03);
      let px = x, py = y;

      entities.push({
        update() {
          px += vx;
          py += vy * 0.98 + 0.3;
          life -= decay;
          return life > 0;
        },
        draw() {
          ctx.save();
          ctx.globalAlpha = life;
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(px, py, radius * life, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      });
    }
  }

  // Trail dot (for touch drag)
  function spawnTrailDot(x, y, color) {
    let life = 1;
    const size = randBetween(8, 20);

    entities.push({
      update() {
        life -= 0.03;
        return life > 0;
      },
      draw() {
        ctx.save();
        ctx.globalAlpha = life * 0.7;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, size * life, 0, Math.PI * 2);
        ctx.fill();
        // Glow effect
        ctx.globalAlpha = life * 0.3;
        ctx.beginPath();
        ctx.arc(x, y, size * life * 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    });
  }

  // Star shape
  function spawnStar(x, y) {
    if (entities.length > 240 && !allowExtraVisual()) return;
    const size = randBetween(30, 80);
    const color = randColor();
    const vx = randBetween(-3, 3);
    const vy = randBetween(-4, -1);
    const spin = randBetween(-0.1, 0.1);
    let rot = 0;
    let life = 1;
    const decay = randBetween(0.006, 0.012);
    const points = Math.floor(randBetween(4, 8));

    entities.push({
      update() {
        x += vx;
        y += vy + 0.5;
        rot += spin;
        life -= decay;
        return life > 0;
      },
      draw() {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        ctx.globalAlpha = life;
        ctx.fillStyle = color;
        ctx.beginPath();
        for (let i = 0; i < points * 2; i++) {
          const r = i % 2 === 0 ? size : size * 0.4;
          const a = (Math.PI * i) / points - Math.PI / 2;
          if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
          else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    });
  }

  // Expanding ring
  function spawnRing(x, y) {
    if (entities.length > 320 && !allowExtraVisual()) return;
    const color = randColor();
    let radius = 10;
    const expandRate = randBetween(4, 8);
    let life = 1;
    const decay = 0.02;
    const lineWidth = randBetween(3, 8);

    entities.push({
      update() {
        radius += expandRate;
        life -= decay;
        return life > 0;
      },
      draw() {
        ctx.save();
        ctx.globalAlpha = life;
        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth * life;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    });
  }


  /** Full-screen warm flash — reads as a distinct "beat" vs normal smashes */
  function spawnSurpriseFlash() {
    let life = 1;
    const decay = 0.028;
    entities.push({
      update() {
        life -= decay;
        return life > 0;
      },
      draw() {
        ctx.save();
        ctx.globalAlpha = life * 0.38;
        const g = ctx.createLinearGradient(0, 0, W, H);
        g.addColorStop(0, 'rgba(255,250,220,1)');
        g.addColorStop(1, 'rgba(255,200,120,0.35)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
      }
    });
  }

  function spawnSurpriseHeavyBurst(x, y, count) {
    const m = motionCalmFactor();
    const n = Math.floor(count * m * visualLoadScale() * surpriseSurgeScale);
    if (n < 1) return;
    const loadFadeBoost = 1 + 0.32 * (1 - visualLoadScale());
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i) / n + randBetween(-0.35, 0.35);
      const speed = randBetween(6, 22);
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      const radius = randBetween(8, 22);
      const color = randColor();
      let life = 1;
      const decay = randBetween(0.0035, 0.007) * loadFadeBoost;
      let px = x, py = y;
      entities.push({
        _surpriseFx: true,
        update() {
          px += vx;
          py += vy * 0.97 + 0.15;
          life -= decay;
          return life > 0;
        },
        draw() {
          ctx.save();
          ctx.globalAlpha = Math.min(1, life * 1.15);
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(px, py, radius * Math.max(0.35, life), 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      });
    }
  }

  function spawnSurpriseBigStar(x, y) {
    if (entities.length > 280 && !allowExtraVisual()) return;
    const size = randBetween(55, 120);
    const color = randColor();
    const vx = randBetween(-2.5, 2.5);
    const vy = randBetween(-5, -2);
    const spin = randBetween(-0.08, 0.08);
    let rot = 0;
    let life = 1;
    const decay = randBetween(0.0022, 0.004);
    const points = Math.floor(randBetween(5, 9));

    entities.push({
      _surpriseFx: true,
      update() {
        x += vx;
        y += vy + 0.35;
        rot += spin;
        life -= decay;
        return life > 0;
      },
      draw() {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        ctx.globalAlpha = life;
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 4 * life;
        ctx.beginPath();
        for (let i = 0; i < points * 2; i++) {
          const r = i % 2 === 0 ? size : size * 0.38;
          const a = (Math.PI * i) / points - Math.PI / 2;
          if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
          else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    });
  }

  function spawnSurpriseRing(x, y) {
    if (entities.length > 300 && !allowExtraVisual()) return;
    const color = randColor();
    let radius = 18;
    const expandRate = randBetween(10, 18);
    let life = 1;
    const decay = 0.0065;
    const lineWidth = randBetween(10, 18);

    entities.push({
      _surpriseFx: true,
      update() {
        radius += expandRate;
        life -= decay;
        return life > 0;
      },
      draw() {
        ctx.save();
        ctx.globalAlpha = life * 0.95;
        ctx.strokeStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 0;
        ctx.lineWidth = lineWidth * life;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    });
  }

  // Bouncing shape
  function spawnBouncingShape(x, y) {
    if (entities.length > 300 && !allowExtraVisual()) return;
    const color = randColor();
    const size = randBetween(20, 50);
    let vx = randBetween(-6, 6);
    let vy = randBetween(-8, -2);
    const shape = Math.floor(Math.random() * 3);
    let life = 1;
    const decay = 0.004;
    let rot = 0;
    const spin = randBetween(-0.05, 0.05);

    if (!playSettings.enhancedPhysics) {
      entities.push({
        update() {
          vy += 0.2;
          x += vx;
          y += vy;
          rot += spin;
          if (x < size) { x = size; vx *= -0.8; }
          if (x > W - size) { x = W - size; vx *= -0.8; }
          if (y > H - size) { y = H - size; vy *= -0.8; }
          if (y < size) { y = size; vy *= -0.8; }
          life -= decay;
          return life > 0;
        },
        draw() {
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(rot);
          ctx.globalAlpha = life;
          ctx.fillStyle = color;
          ctx.beginPath();
          if (shape === 0) {
            ctx.arc(0, 0, size, 0, Math.PI * 2);
          } else if (shape === 1) {
            ctx.rect(-size, -size, size * 2, size * 2);
          } else {
            ctx.moveTo(0, -size);
            ctx.lineTo(size, size);
            ctx.lineTo(-size, size);
            ctx.closePath();
          }
          ctx.fill();
          ctx.restore();
        }
      });
      return;
    }

    const pvx = randBetween(-8, 8);
    const pvy = randBetween(-8, 8);
    const body = {
      x, y, vx: pvx, vy: pvy, life, decay, size, color, shape,
      r: size
    };

    entities.push({
      _collide: true,
      body,
      update() {
        body.vy += 0.052;
        body.x += body.vx;
        body.y += body.vy;
        if (body.x < body.r) { body.x = body.r; body.vx *= -0.93; }
        if (body.x > W - body.r) { body.x = W - body.r; body.vx *= -0.93; }
        if (body.y > H - body.r) { body.y = H - body.r; body.vy *= -0.91; }
        if (body.y < body.r) { body.y = body.r; body.vy *= -0.91; }
        const sp = Math.hypot(body.vx, body.vy);
        const vmax = 20;
        if (sp > vmax) {
          body.vx *= vmax / sp;
          body.vy *= vmax / sp;
        }
        body.life -= body.decay;
        return body.life > 0;
      },
      draw() {
        const b = body;
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.globalAlpha = b.life;
        ctx.fillStyle = b.color;
        ctx.beginPath();
        if (b.shape === 0) {
          ctx.arc(0, 0, b.size, 0, Math.PI * 2);
        } else if (b.shape === 1) {
          ctx.rect(-b.size, -b.size, b.size * 2, b.size * 2);
        } else {
          ctx.moveTo(0, -b.size);
          ctx.lineTo(b.size, b.size);
          ctx.lineTo(-b.size, b.size);
          ctx.closePath();
        }
        ctx.fill();
        ctx.restore();
      }
    });
  }

  function thinSurpriseFxIfNeeded() {
    if (entities.length <= SURPRISE_ENTITY_POOL_CAP) return;
    let safety = 450;
    while (entities.length > SURPRISE_ENTITY_TARGET && safety-- > 0) {
      const idx = entities.findIndex((e) => e._surpriseFx);
      if (idx === -1) break;
      entities.splice(idx, 1);
    }
  }

  function resolveCollisions() {
    if (!playSettings.enhancedPhysics) return;
    const list = [];
    for (let i = entities.length - 1; i >= 0; i--) {
      if (entities[i]._collide && entities[i].body) list.push(entities[i]);
      if (list.length >= 32) break;
    }
    const rest = 0.78;
    for (let i = 0; i < list.length; i++) {
      for (let j = i + 1; j < list.length; j++) {
        const a = list[i].body;
        const b = list[j].body;
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.hypot(dx, dy);
        const minD = a.r + b.r;
        if (dist >= minD || dist < 0.001) continue;
        const nx = dx / dist;
        const ny = dy / dist;
        const overlap = minD - dist;
        a.x -= nx * overlap * 0.5;
        a.y -= ny * overlap * 0.5;
        b.x += nx * overlap * 0.5;
        b.y += ny * overlap * 0.5;
        const rvx = b.vx - a.vx;
        const rvy = b.vy - a.vy;
        const reln = rvx * nx + rvy * ny;
        if (reln > 0) continue;
        const jimp = -(1 + rest) * reln / 2;
        a.vx -= jimp * nx;
        a.vy -= jimp * ny;
        b.vx += jimp * nx;
        b.vy += jimp * ny;
      }
    }
  }

  function processOneSurpriseSalvo() {
    const job = surpriseSalvoQueue.shift();
    if (!job) return;
    spawnSurpriseHeavyBurst(job.sx, job.sy, Math.floor(randBetween(11, 22) * Math.max(0.5, job.calm)));
    if (Math.random() < 0.55) spawnSurpriseBigStar(job.sx, job.sy);
    if (Math.random() < 0.38 * Math.max(0.45, job.calm)) spawnEmoji(job.sx, job.sy);
    if (Math.random() < job.starChance * 0.65) spawnStar(job.sx, job.sy);
  }

  function triggerSurprise() {
    const th = themeDef(playTheme);
    const calm = motionCalmFactor();
    const v = visualLoadScale();
    surpriseSurgeScale = computeSurpriseSurgeScale();

    playSurpriseFanfare();
    spawnSurpriseFlash();
    bumpThemeHue('surprise');

    const cx = W * 0.5 + randBetween(-30, 30);
    const cy = H * 0.4 + randBetween(-40, 40);

    const rings = Math.max(1, Math.min(2, Math.round(2 * Math.max(0.35, v))));
    const bigStars = 1;

    surpriseOpeningQueue.length = 0;
    surpriseOpeningQueue.push(() => {
      for (let r = 0; r < rings; r++) {
        spawnSurpriseRing(cx + randBetween(-50, 50), cy + randBetween(-40, 40));
      }
    });
    surpriseOpeningQueue.push(() => {
      spawnSurpriseHeavyBurst(cx, cy, Math.floor(20 * Math.max(0.55, calm)));
    });
    surpriseOpeningQueue.push(() => {
      for (let s = 0; s < bigStars; s++) {
        spawnSurpriseBigStar(cx + randBetween(-120, 120), cy + randBetween(-80, 80));
      }
    });

    const baseSalvos = Math.max(2, Math.floor(4 * Math.max(0.5, calm)));
    const salvos = Math.max(2, Math.floor(baseSalvos * Math.max(0.35, v)));
    surpriseSalvoQueue.length = 0;
    for (let k = 0; k < salvos; k++) {
      surpriseSalvoQueue.push({
        sx: randBetween(W * 0.1, W * 0.9),
        sy: randBetween(H * 0.12, H * 0.88),
        calm,
        starChance: th.starChance
      });
    }
  }

  function fireSurpriseCycle() {
    triggerSurprise();
    smashCountSinceSurprise = 0;
    nextSurpriseAt = Date.now() + SURPRISE_INTERVAL_MS;
  }

  // ─── Main keystroke handler (desktop) ─────────────────
  function handleSmash(e) {
    if (!active) return;

    e.preventDefault();
    e.stopPropagation();

    if (e.key === 'Escape') {
      const now = Date.now();
      if (now - lastEscTime < 1000) {
        showExit();
        lastEscTime = 0;
        return;
      }
      lastEscTime = now;
      return;
    }

    lastEscTime = 0;

    const x = randBetween(W * 0.1, W * 0.9);
    const y = randBetween(H * 0.15, H * 0.85);
    const th = themeDef(playTheme);

    spawnLetter(e.key, x, y);
    spawnParticles(x, y, Math.floor(randBetween(15, 35)));
    spawnRing(x, y);

    if (Math.random() < th.starChance) spawnStar(x, y);
    if (Math.random() < th.bounceChance) spawnBouncingShape(x, y);

    if (playTheme !== 'shapes' && Math.random() < 0.72) {
      spawnEmoji(x + randBetween(-110, 110), y + randBetween(-70, 70));
    }

    bumpThemeHue('smash');

    speakLearningToken(e.key);
    playSoundForTheme(e, playTheme);

    sessionKeys += 1;
    smashCountSinceSurprise += 1;
    if (smashCountSinceSurprise >= surpriseEveryN()) fireSurpriseCycle();
    updateStatsOverlay();
  }

  // ─── Touch handlers (mobile) ──────────────────────────
  let lastThreeFingerTap = 0;
  /** Touch identifiers that began on the in-game Jam HUD (sliders) — skip smash/trail logic for them */
  const jamHudTouchIds = new Set();

  function handleTouchStart(e) {
    if (!active) return;

    // Let touches on exit overlay buttons pass through to their handlers
    const target = e.target;
    if (target.id === 'resume-btn' || target.id === 'quit-btn') return;
    if (
      playSettings.sessionMode === 'jam' &&
      playSettings.bigKidJam &&
      isInsideJamPlayHud(target)
    ) {
      for (let i = 0; i < e.changedTouches.length; i++) {
        jamHudTouchIds.add(e.changedTouches[i].identifier);
      }
      return;
    }

    e.preventDefault();

    // Three-finger tap: open exit overlay, or resume if already showing
    if (e.touches.length >= 3) {
      if (exitShowing) {
        hideExit();
        lastThreeFingerTap = 0;
        return;
      }
      const now = Date.now();
      if (now - lastThreeFingerTap < 1000) {
        showExit();
        lastThreeFingerTap = 0;
        return;
      }
      lastThreeFingerTap = now;
      return;
    }

    if (exitShowing) return;

    const th = themeDef(playTheme);

    // Process each new touch point
    for (let i = 0; i < e.changedTouches.length; i++) {
      const touch = e.changedTouches[i];
      const x = touch.clientX;
      const y = touch.clientY;
      const color = randColor();

      // Track this touch for trails
      activeTouches.set(touch.identifier, { x, y, color });

      // Spawn effects at touch point
      spawnParticles(x, y, Math.floor(randBetween(20, 40)));
      spawnRing(x, y);
      spawnEmoji(x, y);

      if (Math.random() < th.starChance) spawnStar(x, y);
      if (Math.random() < th.bounceChance) spawnBouncingShape(x, y);

      bumpThemeHue('smash');

      playTouchSoundForTheme(x, y, playTheme);

      sessionTouches += 1;
      smashCountSinceSurprise += 1;
      if (smashCountSinceSurprise >= surpriseEveryN()) fireSurpriseCycle();
      updateStatsOverlay();
    }
  }

  function handleTouchMove(e) {
    if (!active || exitShowing) return;
    if (playSettings.sessionMode === 'jam' && playSettings.bigKidJam && jamHudTouchIds.size) {
      let anyNonHudMove = false;
      for (let i = 0; i < e.changedTouches.length; i++) {
        if (!jamHudTouchIds.has(e.changedTouches[i].identifier)) {
          anyNonHudMove = true;
          break;
        }
      }
      if (e.changedTouches.length && !anyNonHudMove) return;
    }
    e.preventDefault();

    const th = themeDef(playTheme);

    for (let i = 0; i < e.changedTouches.length; i++) {
      const touch = e.changedTouches[i];
      const x = touch.clientX;
      const y = touch.clientY;
      const tracked = activeTouches.get(touch.identifier);

      if (tracked) {
        // Spawn trail dots between previous and current position
        const dx = x - tracked.x;
        const dy = y - tracked.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const stepDiv = playSettings.enhancedPhysics ? 20 : 10;
        let steps = Math.max(1, Math.floor(dist / stepDiv));
        const trailThresh = isGrooveSession() ? 175 : 200;
        if (entities.length > trailThresh) {
          steps = Math.max(1, Math.ceil(steps * Math.max(0.22, visualLoadScale())));
        }

        for (let s = 0; s < steps; s++) {
          const t = s / steps;
          const tx = tracked.x + dx * t;
          const ty = tracked.y + dy * t;
          spawnTrailDot(tx, ty, tracked.color);
        }

        // Occasionally spawn extra effects while dragging
        if (Math.random() < th.emojiDragChance * motionCalmFactor()) {
          spawnEmoji(x, y);
        }
        if (Math.random() < 0.1 * motionCalmFactor()) {
          spawnParticles(x, y, 8);
        }

        tracked.x = x;
        tracked.y = y;
      }
    }
  }

  function handleTouchEnd(e) {
    if (!active) return;

    const hasNonHudEnd = [...e.changedTouches].some((t) => !jamHudTouchIds.has(t.identifier));
    if (!hasNonHudEnd) {
      for (let i = 0; i < e.changedTouches.length; i++) {
        jamHudTouchIds.delete(e.changedTouches[i].identifier);
      }
      return;
    }

    e.preventDefault();

    for (let i = 0; i < e.changedTouches.length; i++) {
      const touch = e.changedTouches[i];
      if (jamHudTouchIds.has(touch.identifier)) {
        jamHudTouchIds.delete(touch.identifier);
        continue;
      }
      const x = touch.clientX;
      const y = touch.clientY;

      // Final burst on lift
      if (!exitShowing) {
        spawnParticles(x, y, 15);
        if (Math.random() < 0.3) spawnRing(x, y);
      }

      activeTouches.delete(touch.identifier);
    }
  }

  // ─── Mouse handler (desktop click fallback) ───────────
  function handleMouseDown(e) {
    if (!active || exitShowing || isMobile) return;
    if (
      playSettings.sessionMode === 'jam' &&
      playSettings.bigKidJam &&
      isInsideJamPlayHud(e.target)
    ) {
      return;
    }
    e.preventDefault();

    const x = e.clientX;
    const y = e.clientY;

    spawnParticles(x, y, 25);
    spawnRing(x, y);
    if (Math.random() < 0.5) spawnStar(x, y);
    spawnBouncingShape(x, y);
    bumpThemeHue('mouse');
    playMelodicNoteThemed('a', playTheme);
  }

  // ─── Exit overlay ──────────────────────────────────────
  function showExit() {
    exitShowing = true;
    document.getElementById('exit-overlay').classList.add('visible');
  }

  function hideExit() {
    exitShowing = false;
    document.getElementById('exit-overlay').classList.remove('visible');
  }

  function quitApp() {
    active = false;
    document.body.classList.remove('game-active');
    document.body.classList.remove('big-kid-jam');
    updateJamPlayHud();
    hideExit();
    entities.length = 0;
    surpriseSalvoQueue.length = 0;
    surpriseOpeningQueue.length = 0;
    surpriseSurgeScale = 1;
    activeTouches.clear();
    jamHudTouchIds.clear();
    smashCountSinceSurprise = 0;
    nextSurpriseAt = 0;
    if ('speechSynthesis' in window) speechSynthesis.cancel();
    stopJamBeatLoop();

    const statsEl = document.getElementById('stats-overlay');
    if (statsEl) {
      statsEl.classList.remove('visible');
      statsEl.setAttribute('aria-hidden', 'true');
    }

    if (document.fullscreenElement) {
      document.exitFullscreen().catch(() => {});
    }

    document.getElementById('start-screen').style.display = 'flex';
    document.body.style.cursor = 'default';

    // Release wake lock if held
    if (wakeLock) {
      wakeLock.release().catch(() => {});
      wakeLock = null;
    }
  }

  // Both click and touchend so buttons work on desktop and mobile
  const resumeBtn = document.getElementById('resume-btn');
  const quitBtn = document.getElementById('quit-btn');

  function handleResume(e) {
    e.stopPropagation();
    e.preventDefault();
    hideExit();
    // Re-enter fullscreen on mobile
    document.documentElement.requestFullscreen().catch(() => {});
  }

  function handleQuit(e) {
    e.stopPropagation();
    e.preventDefault();
    quitApp();
  }

  resumeBtn.addEventListener('click', handleResume);
  resumeBtn.addEventListener('touchend', handleResume);
  quitBtn.addEventListener('click', handleQuit);
  quitBtn.addEventListener('touchend', handleQuit);

  // ─── Wake Lock (keep screen on) ───────────────────────
  let wakeLock = null;

  async function requestWakeLock() {
    if ('wakeLock' in navigator) {
      try {
        wakeLock = await navigator.wakeLock.request('screen');
      } catch (_) {}
    }
  }

  // Wake lock re-acquisition is handled in the main visibilitychange listener below

  // ─── Settings UI ───────────────────────────────────────
  const settingsPanel = document.getElementById('settings-panel');
  const settingsToggle = document.getElementById('settings-toggle');
  const themeChips = document.querySelectorAll('.theme-chip[data-theme]');
  const optLetter = document.getElementById('opt-letter');
  const optPhysics = document.getElementById('opt-physics');
  const optVolume = document.getElementById('opt-volume');
  const optMute = document.getElementById('opt-mute');
  const sessionModeChips = document.querySelectorAll('[data-session-mode]');
  const jamBeatOptionsEl = document.getElementById('jam-beat-options');
  const optJamBpm = document.getElementById('opt-jam-bpm');
  const optJamMix = document.getElementById('opt-jam-mix');
  const optBigKidJam = document.getElementById('opt-big-kid-jam');
  const jamPlayHudEl = document.getElementById('jam-play-hud');
  const optJamBpmHud = document.getElementById('opt-jam-bpm-hud');
  const optJamMixHud = document.getElementById('opt-jam-mix-hud');
  const playmodeHintText = document.getElementById('playmode-hint-text');
  const jamPatternChips = document.querySelectorAll('.jam-pattern-chip');

  function getJamPatternFromUI() {
    const b =
      document.querySelector('#jam-pattern-chips-menu [data-jam-pattern][aria-checked="true"]') ||
      document.querySelector('.jam-pattern-chip[aria-checked="true"]');
    if (!b) return 0;
    return clampJamPattern(parseInt(b.getAttribute('data-jam-pattern'), 10));
  }

  function setJamPatternChipsToIndex(i) {
    const idx = clampJamPattern(i);
    jamPatternChips.forEach((btn) => {
      const j = parseInt(btn.getAttribute('data-jam-pattern'), 10);
      btn.setAttribute('aria-checked', j === idx ? 'true' : 'false');
    });
  }

  function isInsideJamPlayHud(target) {
    if (!jamPlayHudEl || jamPlayHudEl.hidden) return false;
    return !!(target && target.closest && target.closest('#jam-play-hud'));
  }

  function syncJamBpmSlidersValue(v) {
    const n = clampJamBpm(v);
    if (optJamBpm) optJamBpm.value = n;
    if (optJamBpmHud) optJamBpmHud.value = n;
  }

  function syncJamMixSlidersValue(v) {
    const n = Math.max(0, Math.min(1, typeof v === 'number' && !Number.isNaN(v) ? v : 0.55));
    if (optJamMix) optJamMix.value = n;
    if (optJamMixHud) optJamMixHud.value = n;
  }

  function updateJamPlayHud() {
    if (!jamPlayHudEl) return;
    const show = active && playSettings.sessionMode === 'jam' && playSettings.bigKidJam;
    jamPlayHudEl.hidden = !show;
    jamPlayHudEl.setAttribute('aria-hidden', show ? 'false' : 'true');
  }

  function updateJamBeatPanelVisibility() {
    if (!jamBeatOptionsEl) return;
    const sel = [...sessionModeChips].find((b) => b.getAttribute('aria-checked') === 'true');
    jamBeatOptionsEl.hidden = !sel || sel.dataset.sessionMode !== 'jam';
  }

  function updatePlayModeHint() {
    if (!playmodeHintText) return;
    const sel = [...sessionModeChips].find((b) => b.getAttribute('aria-checked') === 'true');
    const mode = sel && sel.dataset.sessionMode ? sel.dataset.sessionMode : 'classic';
    const copy = {
      classic: 'Original sounds and colors.',
      groove: 'Softer, sweeter sounds.',
      jam: 'Adds a beat behind your play. Adjust below.'
    };
    playmodeHintText.textContent = copy[mode] || copy.classic;
  }

  function initThemeChipPreviews() {
    themeChips.forEach((btn) => {
      const id = btn.dataset.theme;
      const th = THEMES[id];
      const el = btn.querySelector('.theme-chip-preview');
      if (!el || !th || !th.palette || th.palette.length === 0) return;
      const cols = th.palette.slice(0, 4);
      el.style.background = `linear-gradient(90deg, ${cols.join(',')})`;
    });
  }

  function readSettingsFromUI() {
    const sel = [...themeChips].find((b) => b.getAttribute('aria-checked') === 'true');
    const theme = sel && sel.dataset.theme ? sel.dataset.theme : 'shapes';
    const sm = [...sessionModeChips].find((b) => b.getAttribute('aria-checked') === 'true');
    const sessionMode = sm && sm.dataset.sessionMode ? sm.dataset.sessionMode : 'classic';
    const jamBpm = optJamBpm
      ? clampJamBpm(parseInt(optJamBpm.value, 10) || JAM_BPM_DEFAULT)
      : JAM_BPM_DEFAULT;
    const jamMix = optJamMix
      ? Math.max(0, Math.min(1, parseFloat(optJamMix.value) || 0.55))
      : 0.55;
    return {
      theme,
      sessionMode,
      jamBpm,
      jamMix,
      jamPattern: getJamPatternFromUI(),
      bigKidJam: optBigKidJam ? optBigKidJam.checked : false,
      letterLearning: optLetter.checked,
      enhancedPhysics: optPhysics.checked,
      volume: Math.max(0, Math.min(1, parseFloat(optVolume.value) || 1)),
      muted: optMute.checked
    };
  }

  function syncSettingsToUI(s) {
    themeChips.forEach((btn) => {
      btn.setAttribute('aria-checked', btn.dataset.theme === s.theme ? 'true' : 'false');
    });
    const mode = typeof s.sessionMode === 'string' ? s.sessionMode : 'classic';
    sessionModeChips.forEach((btn) => {
      btn.setAttribute('aria-checked', btn.dataset.sessionMode === mode ? 'true' : 'false');
    });
    syncJamBpmSlidersValue(
      typeof s.jamBpm === 'number'
        ? s.jamBpm
        : typeof s.grooveBpm === 'number'
          ? s.grooveBpm
          : JAM_BPM_DEFAULT
    );
    syncJamMixSlidersValue(
      typeof s.jamMix === 'number'
        ? s.jamMix
        : typeof s.grooveMix === 'number'
          ? s.grooveMix
          : 0.55
    );
    if (optBigKidJam) optBigKidJam.checked = !!s.bigKidJam;
    setJamPatternChipsToIndex(clampJamPattern(s.jamPattern));
    updateJamBeatPanelVisibility();
    updatePlayModeHint();
    optLetter.checked = s.letterLearning;
    optPhysics.checked = s.enhancedPhysics;
    optVolume.value = typeof s.volume === 'number' ? s.volume : 1;
    optMute.checked = !!s.muted;
  }

  themeChips.forEach((btn) => {
    btn.addEventListener('click', () => {
      themeChips.forEach((b) => b.setAttribute('aria-checked', 'false'));
      btn.setAttribute('aria-checked', 'true');
      saveSettings(readSettingsFromUI());
    });
  });

  sessionModeChips.forEach((btn) => {
    btn.addEventListener('click', () => {
      sessionModeChips.forEach((b) => b.setAttribute('aria-checked', 'false'));
      btn.setAttribute('aria-checked', 'true');
      updateJamBeatPanelVisibility();
      updatePlayModeHint();
      saveSettings(readSettingsFromUI());
    });
  });

  optLetter.addEventListener('change', () => saveSettings(readSettingsFromUI()));
  optPhysics.addEventListener('change', () => saveSettings(readSettingsFromUI()));
  optVolume.addEventListener('input', () => {
    const s = readSettingsFromUI();
    playSettings.volume = s.volume;
    saveSettings(s);
    applyMasterVolume();
  });
  optMute.addEventListener('change', () => {
    const s = readSettingsFromUI();
    playSettings.muted = s.muted;
    saveSettings(s);
    applyMasterVolume();
  });

  function onJamBpmSliderInput(e) {
    const raw = e && e.target ? e.target.value : optJamBpm.value;
    const v = clampJamBpm(parseInt(raw, 10) || JAM_BPM_DEFAULT);
    syncJamBpmSlidersValue(v);
    const s = readSettingsFromUI();
    playSettings.jamBpm = s.jamBpm;
    saveSettings(s);
    if (active && playSettings.sessionMode === 'jam') {
      stopJamBeatLoop();
      startJamBeatLoop();
    }
  }

  function onJamMixSliderInput(e) {
    const raw = e && e.target ? e.target.value : optJamMix.value;
    const v = Math.max(0, Math.min(1, parseFloat(raw) || 0.55));
    syncJamMixSlidersValue(v);
    const s = readSettingsFromUI();
    playSettings.jamMix = s.jamMix;
    saveSettings(s);
  }

  if (optJamBpm) optJamBpm.addEventListener('input', onJamBpmSliderInput);
  if (optJamBpmHud) optJamBpmHud.addEventListener('input', onJamBpmSliderInput);
  if (optJamMix) optJamMix.addEventListener('input', onJamMixSliderInput);
  if (optJamMixHud) optJamMixHud.addEventListener('input', onJamMixSliderInput);

  if (optBigKidJam) {
    optBigKidJam.addEventListener('change', () => {
      const s = readSettingsFromUI();
      playSettings.bigKidJam = s.bigKidJam;
      saveSettings(s);
      if (active) {
        if (playSettings.sessionMode === 'jam' && playSettings.bigKidJam) {
          document.body.classList.add('big-kid-jam');
        } else {
          document.body.classList.remove('big-kid-jam');
        }
        updateJamPlayHud();
      }
    });
  }

  jamPatternChips.forEach((btn) => {
    btn.addEventListener('click', () => {
      const i = clampJamPattern(parseInt(btn.getAttribute('data-jam-pattern'), 10));
      setJamPatternChipsToIndex(i);
      const s = readSettingsFromUI();
      playSettings.jamPattern = s.jamPattern;
      saveSettings(s);
      if (active && playSettings.sessionMode === 'jam') {
        jamBeatStep = 0;
        stopJamBeatLoop();
        startJamBeatLoop();
      }
    });
  });

  settingsToggle.addEventListener('click', () => {
    const open = settingsPanel.hidden;
    settingsPanel.hidden = !open;
    settingsToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    settingsToggle.textContent = open ? 'Hide options' : 'Options';
  });

  syncSettingsToUI(loadSettings());
  initThemeChipPreviews();

  // ─── Start ──────────────────────────────────────────────
  document.getElementById('start-btn').addEventListener('click', () => {
    playSettings = readSettingsFromUI();
    saveSettings(playSettings);
    playTheme = playSettings.theme;
    const th0 = themeDef(playTheme);
    bgHue = th0.bgHueBase;
    bgTargetHue = th0.bgHueBase;
    bgSat = th0.bgSat;
    bgLight = th0.bgLight;
    smashCountSinceSurprise = 0;
    nextSurpriseAt = Date.now() + SURPRISE_INTERVAL_MS;

    sessionKeys = 0;
    sessionTouches = 0;
    updateStatsOverlay();
    const statsEl = document.getElementById('stats-overlay');
    if (statsEl) {
      statsEl.classList.add('visible');
      statsEl.setAttribute('aria-hidden', 'false');
    }

    initAudio();
    attachOneShotAudioResume();
    document.getElementById('start-screen').style.display = 'none';
    document.body.classList.add('game-active');
    if (playSettings.sessionMode === 'jam' && playSettings.bigKidJam) {
      document.body.classList.add('big-kid-jam');
    } else {
      document.body.classList.remove('big-kid-jam');
    }
    active = true;
    startJamBeatLoop();
    updateJamPlayHud();

    // Request fullscreen (may fail on some mobile browsers, that's OK)
    document.documentElement.requestFullscreen().catch(() => {});

    // Keep screen on
    requestWakeLock();
  });

  // ─── Event listeners ───────────────────────────────────
  document.addEventListener('keydown', handleSmash, true);
  document.addEventListener('mousedown', handleMouseDown, true);
  document.addEventListener('touchstart', handleTouchStart, { capture: true, passive: false });
  document.addEventListener('touchmove', handleTouchMove, { capture: true, passive: false });
  document.addEventListener('touchend', handleTouchEnd, { capture: true, passive: false });

  // Block context menu
  document.addEventListener('contextmenu', (e) => {
    if (active) e.preventDefault();
  }, true);

  // Prevent tab from moving focus away
  document.addEventListener('keyup', (e) => {
    if (active) { e.preventDefault(); e.stopPropagation(); }
  }, true);

  // Block all mouse events that could shift focus or trigger browser UI
  document.addEventListener('mouseup', (e) => {
    if (!active || exitShowing) return;
    if (
      playSettings.sessionMode === 'jam' &&
      playSettings.bigKidJam &&
      isInsideJamPlayHud(e.target)
    ) {
      return;
    }
    e.preventDefault();
  }, true);

  document.addEventListener('dblclick', (e) => {
    if (!active) return;
    if (
      playSettings.sessionMode === 'jam' &&
      playSettings.bigKidJam &&
      isInsideJamPlayHud(e.target)
    ) {
      return;
    }
    e.preventDefault();
  }, true);

  // Block drag events (trackpad text selection, file drag, etc.)
  document.addEventListener('dragstart', (e) => {
    if (active) e.preventDefault();
  }, true);

  document.addEventListener('selectstart', (e) => {
    if (active) e.preventDefault();
  }, true);

  // Block middle-click (scroll wheel click opens links, auto-scroll)
  document.addEventListener('auxclick', (e) => {
    if (active) e.preventDefault();
  }, true);

  // Catch scroll/wheel events (trackpad two-finger swipe can navigate)
  document.addEventListener('wheel', (e) => {
    if (active) e.preventDefault();
  }, { capture: true, passive: false });

  // ─── Focus & fullscreen recovery ──────────────────────
  // If the window loses focus while active, reclaim it immediately
  window.addEventListener('blur', () => {
    if (active && !exitShowing) {
      setTimeout(() => window.focus(), 50);
    }
  });

  // If fullscreen is exited unexpectedly (trackpad gesture, OS shortcut),
  // automatically re-enter it
  document.addEventListener('fullscreenchange', () => {
    if (active && !exitShowing && !document.fullscreenElement) {
      // Small delay to avoid rapid toggle loops
      setTimeout(() => {
        if (active && !exitShowing && !document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
        }
      }, 300);
    }
  });

  // If visibility changes (e.g. Mission Control, app switcher), recapture
  // when the page becomes visible again
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') {
      stopJamBeatLoop();
    } else if (active && document.visibilityState === 'visible') {
      requestWakeLock();
      if (playSettings.sessionMode === 'jam') startJamBeatLoop();
      if (!exitShowing) {
        window.focus();
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
        }
      }
    }
  });

  // ─── Render loop ────────────────────────────────────────
  function frame() {
    requestAnimationFrame(frame);
    if (!active) return;

    const th = themeDef(playTheme);
    bgSat += (th.bgSat - bgSat) * 0.04;
    bgLight += (th.bgLight - bgLight) * 0.04;

    bgHue += (bgTargetHue - bgHue) * 0.05;
    ctx.fillStyle = `hsl(${bgHue}, ${bgSat}%, ${bgLight}%)`;
    ctx.fillRect(0, 0, W, H);

    if (nextSurpriseAt > 0 && Date.now() >= nextSurpriseAt) {
      fireSurpriseCycle();
    }

    if (surpriseOpeningQueue.length) {
      const step = surpriseOpeningQueue.shift();
      if (step) step();
    } else {
      for (let k = 0; k < surpriseSalvosPerFrame() && surpriseSalvoQueue.length; k++) {
        processOneSurpriseSalvo();
      }
    }
    if (!surpriseSalvoQueue.length && !surpriseOpeningQueue.length) surpriseSurgeScale = 1;

    for (let i = entities.length - 1; i >= 0; i--) {
      if (!entities[i].update()) entities.splice(i, 1);
    }
    thinSurpriseFxIfNeeded();
    resolveCollisions();
    for (let i = 0; i < entities.length; i++) entities[i].draw();
  }

  frame();

  // ─── Service worker registration ──────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
