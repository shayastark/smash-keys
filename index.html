<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Smash Keys</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    background: #111;
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded MT Bold', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    cursor: none;
    touch-action: none;
    -webkit-touch-callout: none;
  }

  #start-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    z-index: 1000;
    cursor: default;
  }

  #start-screen h1 {
    font-size: clamp(3rem, 10vw, 8rem);
    color: #fff;
    text-shadow: 4px 4px 0 #ff6b6b, 8px 8px 0 #feca57, 12px 12px 0 #48dbfb;
    margin-bottom: 0.5em;
    animation: bounce 1s ease infinite alternate;
  }

  #start-screen p {
    font-size: clamp(1rem, 3vw, 2rem);
    color: rgba(255,255,255,0.9);
    margin-bottom: 2em;
  }

  #start-btn {
    font-family: inherit;
    font-size: clamp(1.2rem, 3vw, 2rem);
    padding: 0.6em 2em;
    border: none;
    border-radius: 50px;
    background: #feca57;
    color: #333;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 6px 0 #f0b429, 0 8px 20px rgba(0,0,0,0.3);
    transition: transform 0.1s, box-shadow 0.1s;
  }

  #start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 0 #f0b429, 0 10px 25px rgba(0,0,0,0.3);
  }

  #start-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #f0b429, 0 4px 10px rgba(0,0,0,0.3);
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-15px); }
  }

  #canvas {
    position: fixed;
    inset: 0;
    display: block;
  }

  #exit-overlay {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    z-index: 2000;
    cursor: default;
  }

  #exit-overlay.visible {
    display: flex;
  }

  #exit-overlay h2 {
    font-size: clamp(2rem, 6vw, 4rem);
    color: #fff;
    margin-bottom: 0.5em;
  }

  #exit-overlay p {
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    color: rgba(255,255,255,0.7);
    margin-bottom: 2em;
  }

  .exit-buttons {
    display: flex;
    gap: 1em;
  }

  .exit-buttons button {
    font-family: inherit;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    padding: 0.5em 1.5em;
    border: none;
    border-radius: 50px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .exit-buttons button:hover { transform: scale(1.05); }

  #resume-btn {
    background: #48dbfb;
    color: #333;
  }

  #quit-btn {
    background: #ff6b6b;
    color: #fff;
  }

  #esc-hint {
    position: fixed;
    bottom: 20px;
    right: 20px;
    color: rgba(255,255,255,0.15);
    font-size: 0.8rem;
    z-index: 500;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="start-screen">
  <h1>Smash Keys!</h1>
  <p>A keyboard playground for tiny hands</p>
  <button id="start-btn">Start Smashing!</button>
</div>

<canvas id="canvas"></canvas>

<div id="exit-overlay">
  <h2>Leaving already?</h2>
  <p>Press ESC again or click Quit to exit</p>
  <div class="exit-buttons">
    <button id="resume-btn">Keep Smashing!</button>
    <button id="quit-btn">Quit</button>
  </div>
</div>

<div id="esc-hint">Press ESC twice to exit</div>

<script>
(() => {
  // ─── Device detection ─────────────────────────────────
  const isMobile = ('ontouchend' in document) && (window.innerWidth < 1024);

  // ─── State ──────────────────────────────────────────────
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  let active = false;
  let lastEscTime = 0;
  let exitShowing = false;

  const entities = [];   // all animated objects
  let bgHue = 220;
  let bgTargetHue = 220;

  // Track active touch points for trails
  const activeTouches = new Map(); // id -> {x, y, color}

  // ─── Adapt UI for mobile ──────────────────────────────
  if (isMobile) {
    document.getElementById('start-screen').querySelector('p').textContent =
      'A touch playground for tiny hands';
    document.getElementById('esc-hint').textContent = 'Tap with 3 fingers to exit';
    document.getElementById('exit-overlay').querySelector('p').textContent =
      'Tap with 3 fingers again or tap Quit to exit';
  }

  // ─── Audio ──────────────────────────────────────────────
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  // ─── Drum sounds (synthesized) ────────────────────────

  function playBassDrum() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const oscGain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(30, t + 0.15);
    oscGain.gain.setValueAtTime(0.8, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(oscGain);
    oscGain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.3);
    const click = audioCtx.createOscillator();
    const clickGain = audioCtx.createGain();
    click.type = 'triangle';
    click.frequency.setValueAtTime(300, t);
    click.frequency.exponentialRampToValueAtTime(60, t + 0.04);
    clickGain.gain.setValueAtTime(0.5, t);
    clickGain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    click.connect(clickGain);
    clickGain.connect(audioCtx.destination);
    click.start(t);
    click.stop(t + 0.06);
  }

  function playSnare(variant) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const bufferSize = audioCtx.sampleRate * 0.15;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = variant === 'shift' ? 5000 : 3500;
    filter.Q.value = variant === 'shift' ? 0.8 : 1.2;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(variant === 'shift' ? 0.4 : 0.35, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    noise.connect(filter);
    filter.connect(noiseGain);
    noiseGain.connect(audioCtx.destination);
    noise.start(t);
    noise.stop(t + 0.15);
    const osc = audioCtx.createOscillator();
    const oscGain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(variant === 'shift' ? 220 : 180, t);
    osc.frequency.exponentialRampToValueAtTime(80, t + 0.08);
    oscGain.gain.setValueAtTime(0.35, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    osc.connect(oscGain);
    oscGain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.1);
  }

  function playHiHat() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const bufferSize = audioCtx.sampleRate * 0.08;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const hpFilter = audioCtx.createBiquadFilter();
    hpFilter.type = 'highpass';
    hpFilter.frequency.value = 7000;
    const bpFilter = audioCtx.createBiquadFilter();
    bpFilter.type = 'bandpass';
    bpFilter.frequency.value = 10000;
    bpFilter.Q.value = 1.5;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.25, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    noise.connect(hpFilter);
    hpFilter.connect(bpFilter);
    bpFilter.connect(gain);
    gain.connect(audioCtx.destination);
    noise.start(t);
    noise.stop(t + 0.08);
  }

  // ─── Synth sounds for 0-9 ─────────────────────────────

  const SYNTH_PATCHES = [
    { type: 'sawtooth', freq: 130.81, attack: 0.01, decay: 0.4, filterFreq: 800 },
    { type: 'square',   freq: 164.81, attack: 0.01, decay: 0.35, filterFreq: 1200 },
    { type: 'sawtooth', freq: 196.00, attack: 0.02, decay: 0.45, filterFreq: 600 },
    { type: 'square',   freq: 220.00, attack: 0.01, decay: 0.3, filterFreq: 1500 },
    { type: 'sawtooth', freq: 261.63, attack: 0.01, decay: 0.5, filterFreq: 900 },
    { type: 'square',   freq: 293.66, attack: 0.02, decay: 0.35, filterFreq: 1100 },
    { type: 'sawtooth', freq: 329.63, attack: 0.01, decay: 0.4, filterFreq: 700 },
    { type: 'square',   freq: 392.00, attack: 0.01, decay: 0.3, filterFreq: 1400 },
    { type: 'sawtooth', freq: 440.00, attack: 0.02, decay: 0.45, filterFreq: 1000 },
    { type: 'square',   freq: 523.25, attack: 0.01, decay: 0.35, filterFreq: 1600 },
  ];

  function playSynth(digit) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const patch = SYNTH_PATCHES[digit];
    const osc = audioCtx.createOscillator();
    osc.type = patch.type;
    osc.frequency.setValueAtTime(patch.freq, t);
    osc.frequency.exponentialRampToValueAtTime(patch.freq * 0.85, t + patch.decay);
    const sub = audioCtx.createOscillator();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(patch.freq * 0.5, t);
    const subGain = audioCtx.createGain();
    subGain.gain.setValueAtTime(0.1, t);
    subGain.gain.exponentialRampToValueAtTime(0.001, t + patch.decay);
    sub.connect(subGain);
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(patch.filterFreq * 3, t);
    filter.frequency.exponentialRampToValueAtTime(patch.filterFreq, t + patch.decay * 0.6);
    filter.Q.value = 5;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.18, t + patch.attack);
    gain.gain.exponentialRampToValueAtTime(0.001, t + patch.decay);
    osc.connect(filter);
    filter.connect(gain);
    subGain.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + patch.decay);
    sub.start(t);
    sub.stop(t + patch.decay);
  }

  // ─── Melodic notes for letter keys ────────────────────

  const NOTE_FREQS = [
    261.63, 293.66, 329.63, 392.00, 440.00,
    523.25, 587.33, 659.25, 783.99, 880.00,
    1046.50, 1174.66, 1318.51, 1567.98, 1760.00
  ];

  function playMelodicNote(key) {
    if (!audioCtx) return;
    const code = key.charCodeAt(0) || 0;
    const freq = NOTE_FREQS[code % NOTE_FREQS.length];
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const types = ['sine', 'triangle', 'square'];
    osc.type = types[code % types.length];
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
  }

  // ─── Position-based sound for mobile touches ──────────

  function playTouchSound(x, y) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    // X position controls pitch: left = low, right = high
    const normalX = x / W;
    const normalY = y / H;

    // Top half = melodic, bottom half = percussive
    if (normalY < 0.5) {
      // Melodic: map x to pentatonic frequency range
      const freqIndex = Math.floor(normalX * NOTE_FREQS.length);
      const freq = NOTE_FREQS[Math.min(freqIndex, NOTE_FREQS.length - 1)];
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      // Vary timbre based on vertical position within top half
      const types = ['sine', 'triangle', 'square'];
      osc.type = types[Math.floor((normalY / 0.5) * types.length)];
      osc.frequency.setValueAtTime(freq, t);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.9, t + 0.4);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + 0.4);
    } else {
      // Percussive: map x to drum type
      if (normalX < 0.33) {
        playBassDrum();
      } else if (normalX < 0.66) {
        playSnare(normalX < 0.5 ? 'shift' : 'enter');
      } else {
        playHiHat();
      }
    }
  }

  // ─── Sound router (keyboard) ──────────────────────────

  function playSound(e) {
    if (e.key === ' ') {
      playBassDrum();
    } else if (e.key === 'Shift') {
      playSnare('shift');
    } else if (e.key === 'Enter') {
      playSnare('enter');
    } else if (e.key === 'Tab') {
      playHiHat();
    } else if (e.key >= '0' && e.key <= '9') {
      playSynth(parseInt(e.key));
    } else {
      playMelodicNote(e.key);
    }
  }

  // ─── Colors ─────────────────────────────────────────────
  const PALETTE = [
    '#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff',
    '#5f27cd', '#01a3a4', '#f368e0', '#ff9f43', '#10ac84',
    '#ee5a24', '#0abde3', '#c8d6e5', '#ffd32a', '#ff3838',
    '#3ae374', '#17c0eb', '#7158e2', '#fd7272', '#34e7e4'
  ];

  const EMOJI_SET = [
    '🌟', '💥', '🎉', '🔥', '⭐', '🎵', '🎶', '❤️',
    '🦄', '🌈', '🚀', '🎸', '🥁', '🎹', '🐱', '🐶',
    '🦋', '🌸', '🍭', '🎈', '🎊', '✨', '💫', '🌺'
  ];

  function randColor() {
    return PALETTE[Math.floor(Math.random() * PALETTE.length)];
  }

  function randBetween(a, b) {
    return a + Math.random() * (b - a);
  }

  // ─── Resize ─────────────────────────────────────────────
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // ─── Entity types ───────────────────────────────────────

  // Floating letter
  function spawnLetter(key, x, y) {
    const size = randBetween(80, 200);
    const color = randColor();
    const vx = randBetween(-2, 2);
    const vy = randBetween(-3, -1);
    const rotation = randBetween(-0.3, 0.3);
    let rot = randBetween(0, Math.PI * 2);
    let life = 1;
    const decay = randBetween(0.008, 0.015);
    const display = key.length === 1 ? key.toUpperCase() : '?';

    entities.push({
      update() {
        x += vx;
        y += vy;
        rot += rotation;
        life -= decay;
        return life > 0;
      },
      draw() {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        ctx.globalAlpha = life;
        ctx.font = `bold ${size}px 'Comic Sans MS', sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = size * 0.06;
        ctx.strokeText(display, 0, 0);
        ctx.fillStyle = color;
        ctx.fillText(display, 0, 0);
        ctx.restore();
      }
    });
  }

  // Floating emoji (mobile)
  function spawnEmoji(x, y) {
    const emoji = EMOJI_SET[Math.floor(Math.random() * EMOJI_SET.length)];
    const size = randBetween(40, 100);
    const vx = randBetween(-3, 3);
    const vy = randBetween(-5, -2);
    const rotation = randBetween(-0.2, 0.2);
    let rot = randBetween(0, Math.PI * 2);
    let life = 1;
    const decay = randBetween(0.008, 0.015);

    entities.push({
      update() {
        x += vx;
        y += vy + 0.3;
        rot += rotation;
        life -= decay;
        return life > 0;
      },
      draw() {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        ctx.globalAlpha = life;
        ctx.font = `${size}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(emoji, 0, 0);
        ctx.restore();
      }
    });
  }

  // Particle burst
  function spawnParticles(x, y, count) {
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + randBetween(-0.2, 0.2);
      const speed = randBetween(3, 12);
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      const radius = randBetween(4, 12);
      const color = randColor();
      let life = 1;
      const decay = randBetween(0.015, 0.03);
      let px = x, py = y;

      entities.push({
        update() {
          px += vx;
          py += vy * 0.98 + 0.3;
          life -= decay;
          return life > 0;
        },
        draw() {
          ctx.save();
          ctx.globalAlpha = life;
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(px, py, radius * life, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      });
    }
  }

  // Trail dot (for touch drag)
  function spawnTrailDot(x, y, color) {
    let life = 1;
    const size = randBetween(8, 20);

    entities.push({
      update() {
        life -= 0.03;
        return life > 0;
      },
      draw() {
        ctx.save();
        ctx.globalAlpha = life * 0.7;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, size * life, 0, Math.PI * 2);
        ctx.fill();
        // Glow effect
        ctx.globalAlpha = life * 0.3;
        ctx.beginPath();
        ctx.arc(x, y, size * life * 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    });
  }

  // Star shape
  function spawnStar(x, y) {
    const size = randBetween(30, 80);
    const color = randColor();
    const vx = randBetween(-3, 3);
    const vy = randBetween(-4, -1);
    const spin = randBetween(-0.1, 0.1);
    let rot = 0;
    let life = 1;
    const decay = randBetween(0.006, 0.012);
    const points = Math.floor(randBetween(4, 8));

    entities.push({
      update() {
        x += vx;
        y += vy + 0.5;
        rot += spin;
        life -= decay;
        return life > 0;
      },
      draw() {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        ctx.globalAlpha = life;
        ctx.fillStyle = color;
        ctx.beginPath();
        for (let i = 0; i < points * 2; i++) {
          const r = i % 2 === 0 ? size : size * 0.4;
          const a = (Math.PI * i) / points - Math.PI / 2;
          if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
          else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    });
  }

  // Expanding ring
  function spawnRing(x, y) {
    const color = randColor();
    let radius = 10;
    const expandRate = randBetween(4, 8);
    let life = 1;
    const decay = 0.02;
    const lineWidth = randBetween(3, 8);

    entities.push({
      update() {
        radius += expandRate;
        life -= decay;
        return life > 0;
      },
      draw() {
        ctx.save();
        ctx.globalAlpha = life;
        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth * life;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    });
  }

  // Bouncing shape
  function spawnBouncingShape(x, y) {
    const color = randColor();
    const size = randBetween(20, 50);
    let vx = randBetween(-6, 6);
    let vy = randBetween(-8, -2);
    const shape = Math.floor(Math.random() * 3);
    let life = 1;
    const decay = 0.004;
    let rot = 0;
    const spin = randBetween(-0.05, 0.05);

    entities.push({
      update() {
        vy += 0.2;
        x += vx;
        y += vy;
        rot += spin;
        if (x < size) { x = size; vx *= -0.8; }
        if (x > W - size) { x = W - size; vx *= -0.8; }
        if (y > H - size) { y = H - size; vy *= -0.8; }
        if (y < size) { y = size; vy *= -0.8; }
        life -= decay;
        return life > 0;
      },
      draw() {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        ctx.globalAlpha = life;
        ctx.fillStyle = color;
        ctx.beginPath();
        if (shape === 0) {
          ctx.arc(0, 0, size, 0, Math.PI * 2);
        } else if (shape === 1) {
          ctx.rect(-size, -size, size * 2, size * 2);
        } else {
          ctx.moveTo(0, -size);
          ctx.lineTo(size, size);
          ctx.lineTo(-size, size);
          ctx.closePath();
        }
        ctx.fill();
        ctx.restore();
      }
    });
  }

  // ─── Main keystroke handler (desktop) ─────────────────
  function handleSmash(e) {
    if (!active) return;

    e.preventDefault();
    e.stopPropagation();

    if (e.key === 'Escape') {
      const now = Date.now();
      if (now - lastEscTime < 1000) {
        showExit();
        lastEscTime = 0;
        return;
      }
      lastEscTime = now;
      return;
    }

    lastEscTime = 0;

    const x = randBetween(W * 0.1, W * 0.9);
    const y = randBetween(H * 0.15, H * 0.85);

    spawnLetter(e.key, x, y);
    spawnParticles(x, y, Math.floor(randBetween(15, 35)));
    spawnRing(x, y);

    if (Math.random() < 0.5) spawnStar(x, y);
    if (Math.random() < 0.3) spawnBouncingShape(x, y);

    bgTargetHue = (bgTargetHue + randBetween(20, 60)) % 360;

    playSound(e);
  }

  // ─── Touch handlers (mobile) ──────────────────────────
  let lastThreeFingerTap = 0;

  function handleTouchStart(e) {
    if (!active) return;

    // Let touches on exit overlay buttons pass through to their handlers
    const target = e.target;
    if (target.id === 'resume-btn' || target.id === 'quit-btn') return;

    e.preventDefault();

    // Three-finger tap: open exit overlay, or resume if already showing
    if (e.touches.length >= 3) {
      if (exitShowing) {
        hideExit();
        lastThreeFingerTap = 0;
        return;
      }
      const now = Date.now();
      if (now - lastThreeFingerTap < 1000) {
        showExit();
        lastThreeFingerTap = 0;
        return;
      }
      lastThreeFingerTap = now;
      return;
    }

    if (exitShowing) return;

    // Process each new touch point
    for (let i = 0; i < e.changedTouches.length; i++) {
      const touch = e.changedTouches[i];
      const x = touch.clientX;
      const y = touch.clientY;
      const color = randColor();

      // Track this touch for trails
      activeTouches.set(touch.identifier, { x, y, color });

      // Spawn effects at touch point
      spawnParticles(x, y, Math.floor(randBetween(20, 40)));
      spawnRing(x, y);
      spawnEmoji(x, y);

      if (Math.random() < 0.5) spawnStar(x, y);
      if (Math.random() < 0.4) spawnBouncingShape(x, y);

      bgTargetHue = (bgTargetHue + randBetween(20, 60)) % 360;

      // Position-based sound
      playTouchSound(x, y);
    }
  }

  function handleTouchMove(e) {
    if (!active || exitShowing) return;
    e.preventDefault();

    for (let i = 0; i < e.changedTouches.length; i++) {
      const touch = e.changedTouches[i];
      const x = touch.clientX;
      const y = touch.clientY;
      const tracked = activeTouches.get(touch.identifier);

      if (tracked) {
        // Spawn trail dots between previous and current position
        const dx = x - tracked.x;
        const dy = y - tracked.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const steps = Math.max(1, Math.floor(dist / 10));

        for (let s = 0; s < steps; s++) {
          const t = s / steps;
          const tx = tracked.x + dx * t;
          const ty = tracked.y + dy * t;
          spawnTrailDot(tx, ty, tracked.color);
        }

        // Occasionally spawn extra effects while dragging
        if (Math.random() < 0.15) {
          spawnEmoji(x, y);
        }
        if (Math.random() < 0.1) {
          spawnParticles(x, y, 8);
        }

        tracked.x = x;
        tracked.y = y;
      }
    }
  }

  function handleTouchEnd(e) {
    if (!active) return;
    e.preventDefault();

    for (let i = 0; i < e.changedTouches.length; i++) {
      const touch = e.changedTouches[i];
      const x = touch.clientX;
      const y = touch.clientY;

      // Final burst on lift
      if (!exitShowing) {
        spawnParticles(x, y, 15);
        if (Math.random() < 0.3) spawnRing(x, y);
      }

      activeTouches.delete(touch.identifier);
    }
  }

  // ─── Mouse handler (desktop click fallback) ───────────
  function handleMouseDown(e) {
    if (!active || exitShowing || isMobile) return;
    e.preventDefault();

    const x = e.clientX;
    const y = e.clientY;

    spawnParticles(x, y, 25);
    spawnRing(x, y);
    if (Math.random() < 0.5) spawnStar(x, y);
    spawnBouncingShape(x, y);
    bgTargetHue = (bgTargetHue + 30) % 360;
    playMelodicNote('a');
  }

  // ─── Exit overlay ──────────────────────────────────────
  function showExit() {
    exitShowing = true;
    document.getElementById('exit-overlay').classList.add('visible');
  }

  function hideExit() {
    exitShowing = false;
    document.getElementById('exit-overlay').classList.remove('visible');
  }

  function quitApp() {
    active = false;
    hideExit();
    entities.length = 0;
    activeTouches.clear();

    if (document.fullscreenElement) {
      document.exitFullscreen().catch(() => {});
    }

    document.getElementById('start-screen').style.display = 'flex';
    document.body.style.cursor = 'default';

    // Release wake lock if held
    if (wakeLock) {
      wakeLock.release().catch(() => {});
      wakeLock = null;
    }
  }

  // Both click and touchend so buttons work on desktop and mobile
  const resumeBtn = document.getElementById('resume-btn');
  const quitBtn = document.getElementById('quit-btn');

  function handleResume(e) {
    e.stopPropagation();
    e.preventDefault();
    hideExit();
    // Re-enter fullscreen on mobile
    document.documentElement.requestFullscreen().catch(() => {});
  }

  function handleQuit(e) {
    e.stopPropagation();
    e.preventDefault();
    quitApp();
  }

  resumeBtn.addEventListener('click', handleResume);
  resumeBtn.addEventListener('touchend', handleResume);
  quitBtn.addEventListener('click', handleQuit);
  quitBtn.addEventListener('touchend', handleQuit);

  // ─── Wake Lock (keep screen on) ───────────────────────
  let wakeLock = null;

  async function requestWakeLock() {
    if ('wakeLock' in navigator) {
      try {
        wakeLock = await navigator.wakeLock.request('screen');
      } catch (_) {}
    }
  }

  // Re-acquire wake lock when page becomes visible again
  document.addEventListener('visibilitychange', () => {
    if (active && document.visibilityState === 'visible') {
      requestWakeLock();
    }
  });

  // ─── Start ──────────────────────────────────────────────
  document.getElementById('start-btn').addEventListener('click', () => {
    initAudio();
    active = true;
    document.getElementById('start-screen').style.display = 'none';
    document.body.style.cursor = 'none';

    // Request fullscreen (may fail on some mobile browsers, that's OK)
    document.documentElement.requestFullscreen().catch(() => {});

    // Keep screen on
    requestWakeLock();
  });

  // ─── Event listeners ───────────────────────────────────
  document.addEventListener('keydown', handleSmash, true);
  document.addEventListener('mousedown', handleMouseDown, true);
  document.addEventListener('touchstart', handleTouchStart, { capture: true, passive: false });
  document.addEventListener('touchmove', handleTouchMove, { capture: true, passive: false });
  document.addEventListener('touchend', handleTouchEnd, { capture: true, passive: false });

  // Block context menu
  document.addEventListener('contextmenu', (e) => {
    if (active) e.preventDefault();
  }, true);

  // Prevent tab from moving focus away
  document.addEventListener('keyup', (e) => {
    if (active) { e.preventDefault(); e.stopPropagation(); }
  }, true);

  // ─── Render loop ────────────────────────────────────────
  function frame() {
    requestAnimationFrame(frame);
    if (!active) return;

    // Smooth background transition
    bgHue += (bgTargetHue - bgHue) * 0.05;
    const bgLight = 15;
    ctx.fillStyle = `hsl(${bgHue}, 40%, ${bgLight}%)`;
    ctx.fillRect(0, 0, W, H);

    // Update and draw entities (iterate backwards for safe removal)
    for (let i = entities.length - 1; i >= 0; i--) {
      if (!entities[i].update()) {
        entities.splice(i, 1);
      } else {
        entities[i].draw();
      }
    }
  }

  frame();
})();
</script>
</body>
</html>
