<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="mobile-web-app-capable" content="yes">

<link rel="apple-touch-icon" href="/icon-192.png">

<meta name="description" content="A colorful keyboard playground for tiny hands.">

<link rel="canonical" href="https://smash-keys.vercel.app/">
<meta property="og:title" content="Smash Keys">
<meta property="og:description" content="A colorful keyboard playground for tiny hands.">
<meta property="og:type" content="website">

<meta name="twitter:title" content="Smash Keys">

<title>Smash Keys</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded MT Bold', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }

  /* Menu can scroll on small screens; lock scroll during play */
  body:not(.game-active) {
    overflow-x: hidden;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    min-height: 100%;
    cursor: default;
    touch-action: pan-y;
  }

  body.game-active {
    overflow: hidden;
    touch-action: none;
  }

  body.game-active:not(.big-kid-jam) {
    cursor: none;
  }

  body.game-active.big-kid-jam {
    cursor: auto;
  }

  #start-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: min(4vh, 2rem) 0.75rem min(3rem, 5vh);
    overflow-x: hidden;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    z-index: 1000;
    cursor: default;
  }

  #start-screen h1 {
    font-size: clamp(3rem, 10vw, 8rem);
    color: #fff;
    text-shadow: 4px 4px 0 #ff6b6b, 8px 8px 0 #feca57, 12px 12px 0 #48dbfb;
    margin-bottom: 0.5em;
    animation: bounce 1s ease infinite alternate;
  }

  #start-screen > p {
    font-size: clamp(1rem, 3vw, 2rem);
    color: rgba(255,255,255,0.9);
    margin-bottom: 2em;
  }

  #start-btn {
    font-family: inherit;
    font-size: clamp(1.2rem, 3vw, 2rem);
    padding: 0.6em 2em;
    border: none;
    border-radius: 50px;
    background: #feca57;
    color: #333;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 6px 0 #f0b429, 0 8px 20px rgba(0,0,0,0.3);
    transition: transform 0.1s, box-shadow 0.1s;
  }

  #start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 0 #f0b429, 0 10px 25px rgba(0,0,0,0.3);
  }

  #start-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #f0b429, 0 4px 10px rgba(0,0,0,0.3);
  }

  #start-screen #start-btn {
    margin-bottom: 0.15em;
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-15px); }
  }

  #canvas {
    position: fixed;
    inset: 0;
    display: block;
  }

  #exit-overlay {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    z-index: 2000;
    cursor: default;
  }

  #exit-overlay.visible {
    display: flex;
  }

  #exit-overlay h2 {
    font-size: clamp(2rem, 6vw, 4rem);
    color: #fff;
    margin-bottom: 0.5em;
  }

  #exit-overlay p {
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    color: rgba(255,255,255,0.7);
    margin-bottom: 2em;
  }

  .exit-buttons {
    display: flex;
    gap: 1em;
  }

  .exit-buttons button {
    font-family: inherit;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    padding: 0.5em 1.5em;
    border: none;
    border-radius: 50px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .exit-buttons button:hover { transform: scale(1.05); }

  #resume-btn {
    background: #48dbfb;
    color: #333;
  }

  #quit-btn {
    background: #ff6b6b;
    color: #fff;
  }

  #esc-hint {
    position: fixed;
    bottom: 20px;
    right: 20px;
    color: rgba(255,255,255,0.15);
    font-size: 0.8rem;
    z-index: 500;
    pointer-events: none;
  }

  #settings-wrap {
    width: min(96vw, 520px);
    margin-top: 0.85em;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #settings-toggle {
    font-family: inherit;
    font-size: clamp(0.75rem, 2vw, 0.95rem);
    padding: 0.28em 0.9em;
    border: 2px solid rgba(255,255,255,0.45);
    border-radius: 999px;
    background: rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.95);
    font-weight: bold;
    cursor: pointer;
    width: auto;
    margin-bottom: 0.4em;
  }

  #settings-toggle:active {
    transform: scale(0.98);
  }

  #settings-panel {
    background: rgba(0,0,0,0.28);
    border-radius: 16px;
    padding: 1.15rem 1.15rem 1.25rem;
    margin-bottom: 0.25em;
    width: 100%;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .settings-section {
    margin: 0;
  }

  .settings-section + .settings-section {
    margin-top: 1.05rem;
    padding-top: 1.05rem;
    border-top: 1px solid rgba(255,255,255,0.14);
  }

  .settings-section--theme .theme-chips {
    margin-bottom: 0.15em;
  }

  #settings-panel[hidden] {
    display: none !important;
  }

  .setting-label {
    display: block;
    font-size: clamp(0.85rem, 2vw, 1.1rem);
    color: rgba(255,255,255,0.95);
    margin-bottom: 0.5em;
    font-weight: bold;
  }

  .theme-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45em;
    justify-content: center;
  }

  .theme-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.35em;
    font-family: inherit;
    font-size: clamp(0.75rem, 2vw, 1rem);
    padding: 0.4em 0.65em;
    border: 3px solid transparent;
    border-radius: 999px;
    background: rgba(255,255,255,0.25);
    color: #fff;
    cursor: pointer;
    font-weight: bold;
  }

  .theme-chip[aria-checked="true"] {
    border-color: #feca57;
    background: rgba(254, 202, 87, 0.35);
    box-shadow: 0 0 0 2px rgba(0,0,0,0.15);
  }

  .toggle-row {
    display: flex;
    align-items: flex-start;
    gap: 0.55em;
    font-size: clamp(0.78rem, 2vw, 1.02rem);
    color: rgba(255,255,255,0.92);
    margin-top: 0.65em;
    cursor: pointer;
    font-weight: 600;
    line-height: 1.38;
  }

  .settings-section--more > .toggle-row {
    margin-top: 0.75em;
  }

  .settings-section--more > .toggle-row:first-child {
    margin-top: 0;
  }

  .toggle-row input {
    width: 1.2em;
    height: 1.2em;
    flex-shrink: 0;
    margin-top: 0.18em;
    accent-color: #feca57;
  }

  .volume-block {
    margin-top: 0.85em;
  }

  .volume-block .setting-label {
    margin-bottom: 0.35em;
  }

  .volume-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.85em 1em;
  }

  .volume-row .toggle-row {
    margin-top: 0;
    align-items: center;
  }

  .volume-row .toggle-row input {
    margin-top: 0;
  }

  #opt-volume {
    flex: 1;
    min-width: 120px;
    max-width: 220px;
    accent-color: #feca57;
  }

  #opt-jam-bpm,
  #opt-jam-mix,
  #opt-jam-bpm-hud,
  #opt-jam-mix-hud {
    flex: 1;
    min-width: 120px;
    max-width: 240px;
    accent-color: #feca57;
  }

  .playmode-chips {
    margin-bottom: 0.4em;
  }

  .setting-hint.playmode-hint {
    font-size: clamp(0.7rem, 1.75vw, 0.88rem);
    color: rgba(255,255,255,0.72);
    margin: 0 0 0.15em;
    font-weight: normal;
    line-height: 1.4;
    max-width: 42em;
  }

  .jam-beat-panel {
    margin-top: 0.65em;
    margin-bottom: 0;
    padding: 0.7em 0.8em;
    border-radius: 12px;
    background: rgba(0,0,0,0.22);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .jam-beat-panel .setting-label {
    margin-top: 0.45em;
  }

  .jam-beat-panel .setting-label:first-child {
    margin-top: 0;
  }

  .jam-pattern-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35em 0.45em;
    margin-top: 0.3em;
    margin-bottom: 0.1em;
  }

  .jam-pattern-chips .theme-chip,
  #jam-play-hud .theme-chip {
    font-size: clamp(0.68rem, 1.8vw, 0.8rem);
    padding: 0.28em 0.5em;
  }

  .jam-beat-panel .jam-big-kid-row {
    margin-top: 0.65em;
  }

  .theme-chip-preview {
    width: 2.35em;
    height: 0.52em;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.4);
    flex-shrink: 0;
    background: rgba(255,255,255,0.2);
  }

  #stats-overlay {
    position: fixed;
    left: 12px;
    bottom: 40px;
    font-size: clamp(0.65rem, 1.8vw, 0.8rem);
    color: rgba(255,255,255,0.22);
    z-index: 450;
    pointer-events: none;
    display: none;
    font-weight: bold;
  }

  #stats-overlay.visible {
    display: block;
  }

  #jam-play-hud {
    position: fixed;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 600;
    max-width: min(200px, 32vw);
    padding: 0.65em 0.75em;
    border-radius: 14px;
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    pointer-events: auto;
    touch-action: manipulation;
    cursor: default;
    user-select: none;
    -webkit-user-select: none;
  }

  #jam-play-hud[hidden] {
    display: none !important;
  }

  #jam-play-hud .jam-play-hud-label {
    display: block;
    font-size: clamp(0.62rem, 1.5vw, 0.72rem);
    color: rgba(255, 255, 255, 0.78);
    margin-top: 0.5em;
    font-weight: bold;
  }

  #jam-play-hud .jam-play-hud-label:first-child {
    margin-top: 0;
  }

  #jam-play-hud .volume-row {
    margin-top: 0.2em;
  }

  #jam-play-hud input[type="range"] {
    width: 100%;
    min-width: 0;
    max-width: none;
  }
</style>
</head>
<body>

<div id="start-screen">
  <h1>Smash Keys!</h1>
  <p>A keyboard playground for tiny hands</p>
  <button id="start-btn">Start Smashing!</button>
  <div id="settings-wrap">
    <button type="button" id="settings-toggle" aria-expanded="false" aria-controls="settings-panel">Options</button>
    <div id="settings-panel" hidden>
      <div class="settings-section settings-section--theme">
        <span class="setting-label" id="theme-label">Theme</span>
        <div class="theme-chips" role="radiogroup" aria-labelledby="theme-label">
          <button type="button" class="theme-chip" data-theme="space" aria-checked="false" role="radio"><span class="theme-chip-preview" aria-hidden="true"></span>Space</button>
          <button type="button" class="theme-chip" data-theme="shapes" aria-checked="true" role="radio"><span class="theme-chip-preview" aria-hidden="true"></span>Shapes</button>
          <button type="button" class="theme-chip" data-theme="ocean" aria-checked="false" role="radio"><span class="theme-chip-preview" aria-hidden="true"></span>Ocean</button>
          <button type="button" class="theme-chip" data-theme="jungle" aria-checked="false" role="radio"><span class="theme-chip-preview" aria-hidden="true"></span>Jungle</button>
          <button type="button" class="theme-chip" data-theme="dinosaurs" aria-checked="false" role="radio"><span class="theme-chip-preview" aria-hidden="true"></span>Dinosaurs</button>
          <button type="button" class="theme-chip" data-theme="music" aria-checked="false" role="radio"><span class="theme-chip-preview" aria-hidden="true"></span>Music</button>
        </div>
      </div>
      <div class="settings-section settings-section--playmode">
        <span class="setting-label" id="playmode-label">Play mode</span>
        <div class="theme-chips playmode-chips" role="radiogroup" aria-labelledby="playmode-label">
          <button type="button" class="theme-chip" data-session-mode="classic" aria-checked="true" role="radio">Classic</button>
          <button type="button" class="theme-chip" data-session-mode="groove" aria-checked="false" role="radio">Groove</button>
          <button type="button" class="theme-chip" data-session-mode="jam" aria-checked="false" role="radio">Jam</button>
        </div>
        <p id="playmode-hint-text" class="setting-hint playmode-hint" aria-live="polite"></p>
        <div id="jam-beat-options" class="jam-beat-panel" hidden>
          <span class="setting-label" id="jam-style-label">Beat style</span>
          <div
            class="theme-chips jam-pattern-chips"
            id="jam-pattern-chips-menu"
            role="radiogroup"
            aria-labelledby="jam-style-label"
          >
            <button
              type="button"
              class="theme-chip jam-pattern-chip"
              data-jam-pattern="0"
              aria-checked="true"
              role="radio"
            >
              Bounce
            </button>
            <button type="button" class="theme-chip jam-pattern-chip" data-jam-pattern="1" aria-checked="false" role="radio">Drive</button>
            <button type="button" class="theme-chip jam-pattern-chip" data-jam-pattern="2" aria-checked="false" role="radio">Float</button>
          </div>
          <span class="setting-label" id="jam-bpm-label">Beat tempo (BPM)</span>
          <div class="volume-row">
            <input type="range" id="opt-jam-bpm" min="70" max="280" step="1" value="140" aria-labelledby="jam-bpm-label" />
          </div>
          <span class="setting-label" id="jam-mix-label">Beat strength</span>
          <div class="volume-row">
            <input type="range" id="opt-jam-mix" min="0" max="1" step="0.01" value="0.55" aria-labelledby="jam-mix-label" />
          </div>
          <label class="toggle-row jam-big-kid-row">
            <input type="checkbox" id="opt-big-kid-jam" />
            <span>Big kid mode — Beat controls on screen while playing</span>
          </label>
        </div>
      </div>
      <div class="settings-section settings-section--more">
        <label class="toggle-row">
          <input type="checkbox" id="opt-letter" />
          <span>Letter learning — Speaks letters &amp; numbers (keyboard only)</span>
        </label>
        <div class="volume-block">
          <span class="setting-label" id="volume-label">Volume</span>
          <div class="volume-row">
            <input type="range" id="opt-volume" min="0" max="1" step="0.01" value="1" aria-labelledby="volume-label" />
            <label class="toggle-row">
              <input type="checkbox" id="opt-mute" />
              <span>Mute</span>
            </label>
          </div>
        </div>
        <label class="toggle-row">
          <input type="checkbox" id="opt-physics" />
          <span>Bouncy letters &amp; shapes (calmer motion)</span>
        </label>
      </div>
    </div>
  </div>
</div>

<canvas id="canvas"></canvas>

<div id="jam-play-hud" class="jam-play-hud" hidden role="region" aria-label="Beat controls">
  <div class="jam-play-hud-inner">
    <span class="jam-play-hud-label" id="jam-hud-style-label">Beat style</span>
    <div
      class="theme-chips jam-pattern-chips"
      id="jam-pattern-chips-hud"
      role="radiogroup"
      aria-labelledby="jam-hud-style-label"
    >
      <button
        type="button"
        class="theme-chip jam-pattern-chip"
        data-jam-pattern="0"
        aria-checked="true"
        role="radio"
      >
        Bounce
      </button>
      <button type="button" class="theme-chip jam-pattern-chip" data-jam-pattern="1" aria-checked="false" role="radio">Drive</button>
      <button type="button" class="theme-chip jam-pattern-chip" data-jam-pattern="2" aria-checked="false" role="radio">Float</button>
    </div>
    <span class="jam-play-hud-label" id="jam-hud-bpm-label">Beat tempo (BPM)</span>
    <div class="volume-row">
      <input type="range" id="opt-jam-bpm-hud" min="70" max="280" step="1" value="140" aria-labelledby="jam-hud-bpm-label" />
    </div>
    <span class="jam-play-hud-label" id="jam-hud-mix-label">Beat strength</span>
    <div class="volume-row">
      <input type="range" id="opt-jam-mix-hud" min="0" max="1" step="0.01" value="0.55" aria-labelledby="jam-hud-mix-label" />
    </div>
  </div>
</div>

<div id="exit-overlay">
  <h2>Leaving already?</h2>
  <p>Press ESC again or click Quit to exit</p>
  <div class="exit-buttons">
    <button id="resume-btn">Keep Smashing!</button>
    <button id="quit-btn">Quit</button>
  </div>
</div>

<div id="esc-hint">Press ESC twice to exit</div>

<div id="stats-overlay" aria-hidden="true"></div>

<script>
(() => {
  // ─── Device detection ─────────────────────────────────
  const isMobile = ('ontouchend' in document) && (window.innerWidth < 1024);

  // ─── State ──────────────────────────────────────────────
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  let active = false;
  let lastEscTime = 0;
  let exitShowing = false;

  const entities = [];   // all animated objects

  /** Smooth visual limiter: fewer new particles when many entities are alive (avoids CPU/GPU spikes). */
  const VISUAL_SOFT_CAP = 260;
  const VISUAL_HARD_CAP = 540;
  /** Groove (melodic) encourages fast play — ramp down a bit earlier so visuals stay smooth. */
  const VISUAL_SOFT_CAP_GROOVE = 220;
  const VISUAL_HARD_CAP_GROOVE = 480;

  function isGrooveSession() {
    return playSettings.sessionMode === 'groove';
  }

  function visualLoadScale() {
    const n = entities.length;
    const soft = isGrooveSession() ? VISUAL_SOFT_CAP_GROOVE : VISUAL_SOFT_CAP;
    const hard = isGrooveSession() ? VISUAL_HARD_CAP_GROOVE : VISUAL_HARD_CAP;
    if (n <= soft) return 1;
    if (n >= hard) return 0.06;
    const t = (n - soft) / (hard - soft);
    return 1 - t * 0.88;
  }

  /** Throttle optional decorations (emoji, extra stars) when the screen is busy */
  function allowExtraVisual() {
    const s = visualLoadScale();
    if (s >= 0.9) return true;
    if (s <= 0.1) return Math.random() < 0.12;
    return Math.random() < 0.35 + s * 0.6;
  }

  /** Surprise fires many particles at once; scale uses pre-spawn count — this tightens bursts when already busy. */
  let surpriseSurgeScale = 1;
  const surpriseSalvoQueue = [];
  /** Opening (rings + center burst + big stars) runs one chunk per frame so a lone surprise never spikes one frame. */
  const surpriseOpeningQueue = [];
  /** Even with zero other entities, heavy bursts are capped — surprise was overloading the render loop on its own. */
  const SURPRISE_SURGE_CAP = 0.34;
  /** When entity count exceeds this, drop oldest surprise-only particles so keys stay responsive */
  const SURPRISE_ENTITY_POOL_CAP = 210;
  const SURPRISE_ENTITY_TARGET = 165;

  function surpriseSalvosPerFrame() {
    return 1;
  }

  function computeSurpriseSurgeScale() {
    const soft = isGrooveSession() ? VISUAL_SOFT_CAP_GROOVE : VISUAL_SOFT_CAP;
    const pad = isGrooveSession() ? 62 : 85;
    const denom = isGrooveSession() ? 278 : 295;
    const budget = soft + pad - entities.length;
    const fromLoad = Math.min(1, Math.max(0.22, budget / denom));
    return Math.min(SURPRISE_SURGE_CAP, fromLoad);
  }

  let bgHue = 220;
  let bgTargetHue = 220;
  let bgSat = 40;
  let bgLight = 15;

  // Track active touch points for trails
  const activeTouches = new Map(); // id -> {x, y, color}

  const STORAGE_KEY = 'smashKeys.v1';
  (function migrateSessionModeV2() {
    if (localStorage.getItem('smashKeys.sessionModeV2')) return;
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const o = JSON.parse(raw);
        if (o.sessionMode === 'groove') o.sessionMode = 'jam';
        else if (o.sessionMode === 'jam') o.sessionMode = 'groove';
        if (typeof o.grooveBpm === 'number' && o.jamBpm === undefined) o.jamBpm = o.grooveBpm;
        if (typeof o.grooveMix === 'number' && o.jamMix === undefined) o.jamMix = o.grooveMix;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(o));
      }
    } catch (_) {}
    localStorage.setItem('smashKeys.sessionModeV2', '1');
  })();

  /** Jam (beat) tempo: default matches former slider max; range is half to double that. */
  const JAM_BPM_DEFAULT = 140;
  const JAM_BPM_MIN = 70;
  const JAM_BPM_MAX = 280;

  function clampJamBpm(v) {
    if (typeof v !== 'number' || Number.isNaN(v)) return JAM_BPM_DEFAULT;
    return Math.max(JAM_BPM_MIN, Math.min(JAM_BPM_MAX, v));
  }

  function clampJamPattern(v) {
    const n = typeof v === 'number' && !Number.isNaN(v) ? v : parseInt(String(v == null ? 0 : v), 10);
    if (Number.isNaN(n)) return 0;
    return Math.max(0, Math.min(2, n));
  }

  /** 8th-note bar: K=kick, h=soft hat, H=hat, 1/2=snare variants, .=rest */
  const JAM_PATTERNS = [
    'Kh1hKh2h',
    'KhKh1h2h',
    'K.hh1hhh'
  ];

  const DEFAULT_SETTINGS = {
    theme: 'shapes',
    sessionMode: 'classic',
    jamBpm: JAM_BPM_DEFAULT,
    jamMix: 0.55,
    jamPattern: 0,
    bigKidJam: false,
    letterLearning: false,
    enhancedPhysics: false,
    volume: 1,
    muted: false
  };

  let sessionKeys = 0;
  let sessionTouches = 0;

  function loadSettings() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { ...DEFAULT_SETTINGS };
      const merged = { ...DEFAULT_SETTINGS, ...JSON.parse(raw) };
      if (merged.jamBpm === undefined && merged.grooveBpm !== undefined) merged.jamBpm = merged.grooveBpm;
      if (merged.jamMix === undefined && merged.grooveMix !== undefined) merged.jamMix = merged.grooveMix;
      merged.jamBpm = clampJamBpm(merged.jamBpm ?? merged.grooveBpm);
      merged.jamPattern = clampJamPattern(merged.jamPattern);
      return merged;
    } catch {
      return { ...DEFAULT_SETTINGS };
    }
  }

  function saveSettings(s) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
    } catch (_) {}
  }

  let playSettings = { ...DEFAULT_SETTINGS };
  let playTheme = 'shapes';

  function motionCalmFactor() {
    return playSettings.enhancedPhysics ? 0.4 : 1;
  }

  /** Surprise bursts: fire after this many key/touch smashes, or when the timer below elapses (whichever first). */
  const SURPRISE_EVERY_N = 50;
  /** Non-classic modes (Groove melodic + Jam beat): less frequent surprises */
  const SURPRISE_EVERY_N_GROOVE_OR_JAM = 100;
  const SURPRISE_INTERVAL_MS = 60000;

  function surpriseEveryN() {
    const m = playSettings.sessionMode;
    if (m === 'groove' || m === 'jam') return SURPRISE_EVERY_N_GROOVE_OR_JAM;
    return SURPRISE_EVERY_N;
  }

  let smashCountSinceSurprise = 0;
  let nextSurpriseAt = 0;

  let jamBeatTimeoutId = null;
  let jamBeatStep = 0;

  // ─── Adapt UI for mobile ──────────────────────────────
  if (isMobile) {
    document.getElementById('start-screen').querySelector('p').textContent =
      'A touch playground for tiny hands';
    document.getElementById('esc-hint').textContent = 'Tap with 3 fingers to exit';
    document.getElementById('exit-overlay').querySelector('p').textContent =
      'Tap with 3 fingers again or tap Quit to exit';
  }

  // ─── Audio ──────────────────────────────────────────────
  let audioCtx = null;
  let masterGain = null;

  function getAudioOut() {
    return masterGain || audioCtx.destination;
  }

  function applyMasterVolume() {
    if (!masterGain) return;
    const v = playSettings.muted ? 0 : (typeof playSettings.volume === 'number' ? playSettings.volume : 1);
    masterGain.gain.value = Math.max(0, Math.min(1, v));
  }

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 1;
      masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    applyMasterVolume();
  }

  function attachOneShotAudioResume() {
    function onFirstGesture() {
      if (!active) return;
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume().catch(() => {});
      }
      document.removeEventListener('pointerdown', onFirstGesture, true);
      document.removeEventListener('touchstart', onFirstGesture, true);
    }
    document.addEventListener('pointerdown', onFirstGesture, true);
    document.addEventListener('touchstart', onFirstGesture, true);
  }

  function updateStatsOverlay() {
    const el = document.getElementById('stats-overlay');
    if (!el) return;
    el.textContent = isMobile
      ? `Touches: ${sessionTouches}`
      : `Keys: ${sessionKeys}`;
  }

  // ─── Drum sounds (synthesized) ────────────────────────

  function playBassDrum() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const oscGain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(30, t + 0.15);
    oscGain.gain.setValueAtTime(0.8, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(oscGain);
    oscGain.connect(getAudioOut());
    osc.start(t);
    osc.stop(t + 0.3);
    const click = audioCtx.createOscillator();
    const clickGain = audioCtx.createGain();
    click.type = 'triangle';
    click.frequency.setValueAtTime(300, t);
    click.frequency.exponentialRampToValueAtTime(60, t + 0.04);
    clickGain.gain.setValueAtTime(0.5, t);
    clickGain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    click.connect(clickGain);
    clickGain.connect(getAudioOut());
    click.start(t);
    click.stop(t + 0.06);
  }

  function playSnare(variant) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const bufferSize = audioCtx.sampleRate * 0.15;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = variant === 'shift' ? 5000 : 3500;
    filter.Q.value = variant === 'shift' ? 0.8 : 1.2;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(variant === 'shift' ? 0.4 : 0.35, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    noise.connect(filter);
    filter.connect(noiseGain);
    noiseGain.connect(getAudioOut());
    noise.start(t);
    noise.stop(t + 0.15);
    const osc = audioCtx.createOscillator();
    const oscGain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(variant === 'shift' ? 220 : 180, t);
    osc.frequency.exponentialRampToValueAtTime(80, t + 0.08);
    oscGain.gain.setValueAtTime(0.35, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    osc.connect(oscGain);
    oscGain.connect(getAudioOut());
    osc.start(t);
    osc.stop(t + 0.1);
  }

  function playHiHat() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const bufferSize = audioCtx.sampleRate * 0.08;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const hpFilter = audioCtx.createBiquadFilter();
    hpFilter.type = 'highpass';
    hpFilter.frequency.value = 7000;
    const bpFilter = audioCtx.createBiquadFilter();
    bpFilter.type = 'bandpass';
    bpFilter.frequency.value = 10000;
    bpFilter.Q.value = 1.5;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.25, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    noise.connect(hpFilter);
    hpFilter.connect(bpFilter);
    bpFilter.connect(gain);
    gain.connect(getAudioOut());
    noise.start(t);
    noise.stop(t + 0.08);
  }


  function jamBeatMixScale() {
    const m = typeof playSettings.jamMix === 'number' ? playSettings.jamMix : 0.55;
    return Math.max(0.06, Math.min(1, m)) * 0.72;
  }

  function playJamKick() {
    if (!audioCtx) return;
    const g = jamBeatMixScale();
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const oscGain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(30, t + 0.15);
    oscGain.gain.setValueAtTime(0.8 * g, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(oscGain);
    oscGain.connect(getAudioOut());
    osc.start(t);
    osc.stop(t + 0.3);
    const click = audioCtx.createOscillator();
    const clickGain = audioCtx.createGain();
    click.type = 'triangle';
    click.frequency.setValueAtTime(300, t);
    click.frequency.exponentialRampToValueAtTime(60, t + 0.04);
    clickGain.gain.setValueAtTime(0.5 * g, t);
    clickGain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    click.connect(clickGain);
    clickGain.connect(getAudioOut());
    click.start(t);
    click.stop(t + 0.06);
  }

  function playJamSnare(variant) {
    if (!audioCtx) return;
    const g = jamBeatMixScale();
    const t = audioCtx.currentTime;
    const bufferSize = audioCtx.sampleRate * 0.15;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = variant === 'shift' ? 5000 : 3500;
    filter.Q.value = variant === 'shift' ? 0.8 : 1.2;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime((variant === 'shift' ? 0.4 : 0.35) * g, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    noise.connect(filter);
    filter.connect(noiseGain);
    noiseGain.connect(getAudioOut());
    noise.start(t);
    noise.stop(t + 0.15);
    const osc = audioCtx.createOscillator();
    const oscGain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime((variant === 'shift' ? 220 : 180), t);
    osc.frequency.exponentialRampToValueAtTime(80, t + 0.08);
    oscGain.gain.setValueAtTime(0.35 * g, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    osc.connect(oscGain);
    oscGain.connect(getAudioOut());
    osc.start(t);
    osc.stop(t + 0.1);
  }

  function playJamHat() {
    if (!audioCtx) return;
    const g = jamBeatMixScale();
    const t = audioCtx.currentTime;
    const bufferSize = audioCtx.sampleRate * 0.08;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const hpFilter = audioCtx.createBiquadFilter();
    hpFilter.type = 'highpass';
    hpFilter.frequency.value = 7000;
    const bpFilter = audioCtx.createBiquadFilter();
    bpFilter.type = 'bandpass';
    bpFilter.frequency.value = 10000;
    bpFilter.Q.value = 1.5;
    const gn = audioCtx.createGain();
    gn.gain.setValueAtTime(0.25 * g, t);
    gn.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    noise.connect(hpFilter);
    hpFilter.connect(bpFilter);
    bpFilter.connect(gn);
    gn.connect(getAudioOut());
    noise.start(t);
    noise.stop(t + 0.08);
  }

  /** Quiet 8th-note hats so the groove feels like a continuous loop, not isolated hits */
  function playJamSoftHat() {
    if (!audioCtx) return;
    const g = jamBeatMixScale() * 0.38;
    const t = audioCtx.currentTime;
    const bufferSize = audioCtx.sampleRate * 0.05;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const hpFilter = audioCtx.createBiquadFilter();
    hpFilter.type = 'highpass';
    hpFilter.frequency.value = 5500;
    const bpFilter = audioCtx.createBiquadFilter();
    bpFilter.type = 'bandpass';
    bpFilter.frequency.value = 9000;
    bpFilter.Q.value = 1.2;
    const gn = audioCtx.createGain();
    gn.gain.setValueAtTime(0.14 * g, t);
    gn.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    noise.connect(hpFilter);
    hpFilter.connect(bpFilter);
    bpFilter.connect(gn);
    gn.connect(getAudioOut());
    noise.start(t);
    noise.stop(t + 0.05);
  }

  function stopJamBeatLoop() {
    if (jamBeatTimeoutId !== null) {
      clearTimeout(jamBeatTimeoutId);
      jamBeatTimeoutId = null;
    }
  }

  function playJamPatternChar(ch) {
    if (ch === 'K') playJamKick();
    else if (ch === 'h') playJamSoftHat();
    else if (ch === 'H') playJamHat();
    else if (ch === '1') playJamSnare('shift');
    else if (ch === '2') playJamSnare('enter');
  }

  function scheduleJamBeat() {
    jamBeatTimeoutId = null;
    if (!active || playSettings.sessionMode !== 'jam') return;
    const bpm = clampJamBpm(typeof playSettings.jamBpm === 'number' ? playSettings.jamBpm : JAM_BPM_DEFAULT);
    const eighthMs = 30000 / bpm;
    const patIdx = clampJamPattern(playSettings.jamPattern);
    const pat = JAM_PATTERNS[patIdx] || JAM_PATTERNS[0];
    const step = jamBeatStep % 8;
    const ch = pat[step] || '.';
    if (ch !== '.') playJamPatternChar(ch);
    jamBeatStep++;
    jamBeatTimeoutId = setTimeout(scheduleJamBeat, eighthMs);
  }

  function startJamBeatLoop() {
    stopJamBeatLoop();
    jamBeatStep = 0;
    if (playSettings.sessionMode !== 'jam') return;
    scheduleJamBeat();
  }


  // ─── Synth sounds for 0-9 ─────────────────────────────

  const SYNTH_PATCHES = [
    { type: 'sawtooth', freq: 130.81, attack: 0.01, decay: 0.4, filterFreq: 800 },
    { type: 'square',   freq: 164.81, attack: 0.01, decay: 0.35, filterFreq: 1200 },
    { type: 'sawtooth', freq: 196.00, attack: 0.02, decay: 0.45, filterFreq: 600 },
    { type: 'square',   freq: 220.00, attack: 0.01, decay: 0.3, filterFreq: 1500 },
    { type: 'sawtooth', freq: 261.63, attack: 0.01, decay: 0.5, filterFreq: 900 },
    { type: 'square',   freq: 293.66, attack: 0.02, decay: 0.35, filterFreq: 1100 },
    { type: 'sawtooth', freq: 329.63, attack: 0.01, decay: 0.4, filterFreq: 700 },
    { type: 'square',   freq: 392.00, attack: 0.01, decay: 0.3, filterFreq: 1400 },
    { type: 'sawtooth', freq: 440.00, attack: 0.02, decay: 0.45, filterFreq: 1000 },
    { type: 'square',   freq: 523.25, attack: 0.01, decay: 0.35, filterFreq: 1600 },
  ];

  function playSynth(digit) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const patch = SYNTH_PATCHES[digit];
    const osc = audioCtx.createOscillator();
    osc.type = patch.type;
    osc.frequency.setValueAtTime(patch.freq, t);
    osc.frequency.exponentialRampToValueAtTime(patch.freq * 0.85, t + patch.decay);
    const sub = audioCtx.createOscillator();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(patch.freq * 0.5, t);
    const subGain = audioCtx.createGain();
    subGain.gain.setValueAtTime(0.1, t);
    subGain.gain.exponentialRampToValueAtTime(0.001, t + patch.decay);
    sub.connect(subGain);
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(patch.filterFreq * 3, t);
    filter.frequency.exponentialRampToValueAtTime(patch.filterFreq, t + patch.decay * 0.6);
    filter.Q.value = 5;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.18, t + patch.attack);
    gain.gain.exponentialRampToValueAtTime(0.001, t + patch.decay);
    osc.connect(filter);
    filter.connect(gain);
    subGain.connect(gain);
    gain.connect(getAudioOut());
    osc.start(t);
    osc.stop(t + patch.decay);
    sub.start(t);
    sub.stop(t + patch.decay);
  }

  // ─── Melodic notes for letter keys ────────────────────

  const NOTE_FREQS = [
    261.63, 293.66, 329.63, 392.00, 440.00,
    523.25, 587.33, 659.25, 783.99, 880.00,
    1046.50, 1174.66, 1318.51, 1567.98, 1760.00
  ];

  /**
   * Jam mode: one distinct pitch per letter (a–z) by walking C major diatonic steps upward,
   * so keys don’t repeat every few letters like the old 10-note pentatonic bucket.
   */
  const GROOVE_MAJOR_STEPS = [0, 2, 4, 5, 7, 9, 11];
  const GROOVE_LETTER_FREQ = (() => {
    const out = [];
    for (let i = 0; i < 26; i++) {
      const oct = Math.floor(i / 7);
      const deg = i % 7;
      const midi = 60 + oct * 12 + GROOVE_MAJOR_STEPS[deg];
      out.push(440 * Math.pow(2, (midi - 69) / 12));
    }
    return out;
  })();
  /** Keyboard a–z: rotate which pitch “a” starts on per theme (same idea as before, wider palette). */
  const GROOVE_KEY_ROT = { space: 2, ocean: 1, jungle: 3, dinosaurs: 1, music: 2 };
  /** Bright marimba / xylophone voice — clearly different from Classic’s mixed synth keys */
  function playGrooveMarimba(freq, theme) {
    if (!audioCtx) return;
    const t0 = audioCtx.currentTime;
    const dur = 0.55;
    const lpCut = {
      shapes: 2400,
      space: 1900,
      ocean: 3000,
      jungle: 2100,
      dinosaurs: 1700,
      music: 2600
    }[theme] || 2400;

    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const osc3 = audioCtx.createOscillator();
    osc1.type = 'sine';
    osc2.type = 'sine';
    osc3.type = 'sine';
    osc1.frequency.setValueAtTime(freq, t0);
    osc2.frequency.setValueAtTime(freq * 2.01, t0);
    osc3.frequency.setValueAtTime(freq * 3.96, t0);

    const g1 = audioCtx.createGain();
    const g2 = audioCtx.createGain();
    const g3 = audioCtx.createGain();
    g1.gain.setValueAtTime(0.22, t0);
    g2.gain.setValueAtTime(0.1, t0);
    g3.gain.setValueAtTime(0.05, t0);

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.Q.value = 0.7;
    filter.frequency.setValueAtTime(lpCut * 1.4, t0);
    filter.frequency.exponentialRampToValueAtTime(lpCut * 0.55, t0 + dur * 0.85);

    const out = audioCtx.createGain();
    out.gain.setValueAtTime(0, t0);
    out.gain.linearRampToValueAtTime(1, t0 + 0.006);
    out.gain.exponentialRampToValueAtTime(0.001, t0 + dur);

    osc1.connect(g1);
    osc2.connect(g2);
    osc3.connect(g3);
    g1.connect(filter);
    g2.connect(filter);
    g3.connect(filter);
    filter.connect(out);
    out.connect(getAudioOut());
    osc1.start(t0);
    osc2.start(t0);
    osc3.start(t0);
    osc1.stop(t0 + dur);
    osc2.stop(t0 + dur);
    osc3.stop(t0 + dur);
  }

  function playGrooveMelody(key, theme) {
    if (!audioCtx) return;
    const c = key.length === 1 ? key.toLowerCase().charCodeAt(0) : 0;
    if (c < 97 || c > 122) return;
    const shift = theme === 'shapes' ? 0 : (GROOVE_KEY_ROT[theme] || 0);
    const f = GROOVE_LETTER_FREQ[(c - 97 + shift) % 26];
    playGrooveMarimba(f, theme);
  }

  function playMelodicNote(key) {
    if (!audioCtx) return;
    if (playSettings.sessionMode === 'groove') {
      const c = key.length === 1 ? key.toLowerCase().charCodeAt(0) : 0;
      if (c >= 97 && c <= 122) {
        playGrooveMelody(key, 'shapes');
        return;
      }
    }
    const code = key.charCodeAt(0) || 0;
    const freq = NOTE_FREQS[code % NOTE_FREQS.length];
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const types = ['sine', 'triangle', 'square'];
    osc.type = types[code % types.length];
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    osc.connect(gain);
    gain.connect(getAudioOut());
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
  }

  // ─── Position-based sound for mobile touches ──────────

  function playTouchSound(x, y) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    // X position controls pitch: left = low, right = high
    const normalX = x / W;
    const normalY = y / H;

    // Top half = melodic, bottom half = percussive
    if (normalY < 0.5) {
      if (playSettings.sessionMode === 'groove') {
        const slot = Math.min(25, Math.floor(normalX * 26 * 0.9999));
        playGrooveMarimba(GROOVE_LETTER_FREQ[slot], 'shapes');
        return;
      }
      const freqIndex = Math.floor(normalX * NOTE_FREQS.length);
      const freq = NOTE_FREQS[Math.min(freqIndex, NOTE_FREQS.length - 1)];
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const types = ['sine', 'triangle', 'square'];
      osc.type = types[Math.floor((normalY / 0.5) * types.length)];
      osc.frequency.setValueAtTime(freq, t);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.9, t + 0.4);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.connect(gain);
      gain.connect(getAudioOut());
      osc.start(t);
      osc.stop(t + 0.4);
    } else {
      // Percussive: map x to drum type
      if (normalX < 0.33) {
        playBassDrum();
      } else if (normalX < 0.66) {
        playSnare(normalX < 0.5 ? 'shift' : 'enter');
      } else {
        playHiHat();
      }
    }
  }

  // ─── Sound router (keyboard) ──────────────────────────

  function playSound(e) {
    if (e.key === ' ') {
      playBassDrum();
    } else if (e.key === 'Shift') {
      playSnare('shift');
    } else if (e.key === 'Enter') {
      playSnare('enter');
    } else if (e.key === 'Tab') {
      playHiHat();
    } else if (e.key >= '0' && e.key <= '9') {
      playSynth(parseInt(e.key));
    } else {
      playMelodicNote(e.key);
    }
  }

  const DIGIT_NAMES = ['zero', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine'];

  function playSynthWithPatch(patch) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    osc.type = patch.type;
    osc.frequency.setValueAtTime(patch.freq, t);
    osc.frequency.exponentialRampToValueAtTime(patch.freq * 0.85, t + patch.decay);
    const sub = audioCtx.createOscillator();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(patch.freq * 0.5, t);
    const subGain = audioCtx.createGain();
    subGain.gain.setValueAtTime(0.1, t);
    subGain.gain.exponentialRampToValueAtTime(0.001, t + patch.decay);
    sub.connect(subGain);
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(patch.filterFreq * 3, t);
    filter.frequency.exponentialRampToValueAtTime(patch.filterFreq, t + patch.decay * 0.6);
    filter.Q.value = 5;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.18, t + patch.attack);
    gain.gain.exponentialRampToValueAtTime(0.001, t + patch.decay);
    osc.connect(filter);
    filter.connect(gain);
    subGain.connect(gain);
    gain.connect(getAudioOut());
    osc.start(t);
    osc.stop(t + patch.decay);
    sub.start(t);
    sub.stop(t + patch.decay);
  }

  function synthPatchForTheme(digit, theme) {
    const base = SYNTH_PATCHES[digit];
    if (theme === 'shapes') return base;
    const mult = {
      space: { f: 0.62, q: 0.78 },
      ocean: { f: 1.22, q: 1.28 },
      jungle: { f: 0.88, q: 0.95 },
      dinosaurs: { f: 0.72, q: 0.82 },
      music: { f: 1.28, q: 1.22 }
    }[theme] || { f: 1, q: 1 };
    return {
      type: base.type,
      freq: base.freq * mult.f,
      attack: base.attack,
      decay: base.decay * (theme === 'ocean' ? 1.08 : 1),
      filterFreq: base.filterFreq * mult.q
    };
  }

  function playBassDrumThemed(theme) {
    if (theme === 'shapes') {
      playBassDrum();
      return;
    }
    if (!audioCtx) return;
    const mul = { space: 0.58, ocean: 1.28, jungle: 0.88, dinosaurs: 0.68, music: 1.35 }[theme] || 1;
    const t = audioCtx.currentTime;
    const root = 150 * mul;
    const osc = audioCtx.createOscillator();
    const oscGain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(root, t);
    osc.frequency.exponentialRampToValueAtTime(30 * mul, t + 0.15);
    oscGain.gain.setValueAtTime(0.8, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(oscGain);
    oscGain.connect(getAudioOut());
    osc.start(t);
    osc.stop(t + 0.3);
    const click = audioCtx.createOscillator();
    const clickGain = audioCtx.createGain();
    click.type = 'triangle';
    click.frequency.setValueAtTime(300 * mul, t);
    click.frequency.exponentialRampToValueAtTime(60, t + 0.04);
    clickGain.gain.setValueAtTime(0.5, t);
    clickGain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    click.connect(clickGain);
    clickGain.connect(getAudioOut());
    click.start(t);
    click.stop(t + 0.06);
  }

  function playSnareThemed(variant, theme) {
    if (theme === 'shapes') {
      playSnare(variant);
      return;
    }
    if (!audioCtx) return;
    const bp = { space: 0.72, ocean: 1.22, jungle: 0.88, dinosaurs: 0.75, music: 1.28 }[theme] || 1;
    const t = audioCtx.currentTime;
    const bufferSize = audioCtx.sampleRate * 0.15;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    const f0 = (variant === 'shift' ? 5000 : 3500) * bp;
    filter.frequency.value = f0;
    filter.Q.value = variant === 'shift' ? 0.8 : 1.2;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime((variant === 'shift' ? 0.4 : 0.35) * (theme === 'music' ? 1.05 : 1), t);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    noise.connect(filter);
    filter.connect(noiseGain);
    noiseGain.connect(getAudioOut());
    noise.start(t);
    noise.stop(t + 0.15);
    const osc = audioCtx.createOscillator();
    const oscGain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime((variant === 'shift' ? 220 : 180) * bp, t);
    osc.frequency.exponentialRampToValueAtTime(80, t + 0.08);
    oscGain.gain.setValueAtTime(0.35, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    osc.connect(oscGain);
    oscGain.connect(getAudioOut());
    osc.start(t);
    osc.stop(t + 0.1);
  }

  function playHiHatThemed(theme) {
    if (theme === 'shapes') {
      playHiHat();
      return;
    }
    if (!audioCtx) return;
    const bright = { space: 1.35, ocean: 0.78, jungle: 0.75, dinosaurs: 0.72, music: 1.45 }[theme] || 1;
    const t = audioCtx.currentTime;
    const bufferSize = audioCtx.sampleRate * 0.08;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const hpFilter = audioCtx.createBiquadFilter();
    hpFilter.type = 'highpass';
    hpFilter.frequency.value = 7000 * bright;
    const bpFilter = audioCtx.createBiquadFilter();
    bpFilter.type = 'bandpass';
    bpFilter.frequency.value = 10000 * bright;
    bpFilter.Q.value = 1.5;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.25, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    noise.connect(hpFilter);
    hpFilter.connect(bpFilter);
    bpFilter.connect(gain);
    gain.connect(getAudioOut());
    noise.start(t);
    noise.stop(t + 0.08);
  }

  function playMelodicNoteThemed(key, theme) {
    if (playSettings.sessionMode === 'groove') {
      const c = key.length === 1 ? key.toLowerCase().charCodeAt(0) : 0;
      if (c >= 97 && c <= 122) {
        playGrooveMelody(key, theme);
        return;
      }
    }
    if (theme === 'shapes') {
      playMelodicNote(key);
      return;
    }
    if (!audioCtx) return;
    const t0 = audioCtx.currentTime;
    const code = key.charCodeAt(0) || 0;
    const shift = { space: 11, ocean: 4, jungle: 9, dinosaurs: 3, music: 7 }[theme] || 0;
    const freq = NOTE_FREQS[(code + shift) % NOTE_FREQS.length];
    const types = theme === 'music'
      ? ['square', 'sawtooth', 'triangle']
      : theme === 'ocean'
        ? ['sine', 'triangle', 'sine']
        : ['sine', 'triangle', 'square'];
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = types[code % types.length];
    osc.frequency.setValueAtTime(freq, t0);
    const g = theme === 'space' ? 0.13 : 0.15;
    const dur = theme === 'jungle' ? 0.45 : 0.4;
    gain.gain.setValueAtTime(g, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    osc.connect(gain);
    gain.connect(getAudioOut());
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }

  /** Short ascending fanfare — same bright marimba-adjacent vibe, different voicing/timing each time */
  function playSurpriseFanfare() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const toFreq = (midi) => 440 * Math.pow(2, (midi - 69) / 12);
    const voicings = [
      [0, 4, 7, 12],
      [0, 4, 7, 14],
      [0, 4, 7, 16],
      [0, 5, 7, 12],
      [0, 3, 7, 12],
      [0, 4, 7, 19],
    ];
    const iv = voicings[Math.floor(Math.random() * voicings.length)];
    const rootMidi = 58 + Math.floor(Math.random() * 8);
    const chord = iv.map((deg) => toFreq(rootMidi + deg) * (1 + randBetween(-0.0018, 0.0018)));
    const stagger = randBetween(0.042, 0.068);
    const peak = randBetween(0.18, 0.26);
    const types = ['triangle', 'sine'];
    chord.forEach((freq, i) => {
      const t0 = t + i * stagger;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = types[i % 2];
      osc.frequency.setValueAtTime(freq, t0);
      gain.gain.setValueAtTime(0, t0);
      gain.gain.linearRampToValueAtTime(peak, t0 + randBetween(0.014, 0.028));
      gain.gain.exponentialRampToValueAtTime(0.001, t0 + randBetween(0.48, 0.62));
      osc.connect(gain);
      gain.connect(getAudioOut());
      osc.start(t0);
      osc.stop(t0 + 0.65);
    });
  }

  function playSoundForTheme(e, theme) {
    if (theme === 'shapes') {
      playSound(e);
      return;
    }
    if (e.key === ' ') {
      playBassDrumThemed(theme);
    } else if (e.key === 'Shift') {
      playSnareThemed('shift', theme);
    } else if (e.key === 'Enter') {
      playSnareThemed('enter', theme);
    } else if (e.key === 'Tab') {
      playHiHatThemed(theme);
    } else if (e.key >= '0' && e.key <= '9') {
      playSynthWithPatch(synthPatchForTheme(parseInt(e.key, 10), theme));
    } else {
      playMelodicNoteThemed(e.key, theme);
    }
  }

  function playTouchSoundForTheme(x, y, theme) {
    if (theme === 'shapes') {
      playTouchSound(x, y);
      return;
    }
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const normalX = x / W;
    const normalY = y / H;
    const rowShift = { space: 9, ocean: 3, jungle: 11, dinosaurs: 2, music: 6 }[theme] || 0;

    if (normalY < 0.5) {
      if (playSettings.sessionMode === 'groove') {
        const slot = Math.min(25, Math.floor(normalX * 26 * 0.9999));
        const idx = (slot + rowShift) % 26;
        const freq = GROOVE_LETTER_FREQ[idx] * (theme === 'music' ? 1.02 : theme === 'space' ? 0.92 : 1);
        playGrooveMarimba(freq, theme);
        return;
      }
      const freqIndex = Math.floor(normalX * NOTE_FREQS.length);
      const idx = Math.min((freqIndex + rowShift) % NOTE_FREQS.length, NOTE_FREQS.length - 1);
      const freq = NOTE_FREQS[idx] * (theme === 'music' ? 1.02 : theme === 'space' ? 0.92 : 1);
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const types = theme === 'ocean' ? ['sine', 'triangle', 'sine'] : ['sine', 'triangle', 'square'];
      osc.type = types[Math.floor((normalY / 0.5) * types.length) % types.length];
      osc.frequency.setValueAtTime(freq, t);
      osc.frequency.exponentialRampToValueAtTime(freq * (theme === 'dinosaurs' ? 0.88 : 0.9), t + 0.4);
      gain.gain.setValueAtTime(theme === 'space' ? 0.18 : 0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.connect(gain);
      gain.connect(getAudioOut());
      osc.start(t);
      osc.stop(t + 0.4);
    } else {
      if (normalX < 0.33) {
        playBassDrumThemed(theme);
      } else if (normalX < 0.66) {
        playSnareThemed(normalX < 0.5 ? 'shift' : 'enter', theme);
      } else {
        playHiHatThemed(theme);
      }
    }
  }

  function speakLearningToken(key) {
    if (!playSettings.letterLearning || !('speechSynthesis' in window)) return;
    if (key.length === 1 && /[a-zA-Z]/.test(key)) {
      speechSynthesis.cancel();
      // Lowercase avoids "Capital G" style announcements from many TTS engines
      const u = new SpeechSynthesisUtterance(key.toLowerCase());
      u.lang = 'en-US';
      u.rate = 1.05;
      speechSynthesis.speak(u);
    } else if (key.length === 1 && key >= '0' && key <= '9') {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(DIGIT_NAMES[parseInt(key, 10)]);
      u.lang = 'en-US';
      u.rate = 0.95;
      speechSynthesis.speak(u);
    }
  }

  function randColor() {
    const pal = themeDef(playTheme).palette;
    return pal[Math.floor(Math.random() * pal.length)];
  }

  function randEmoji() {
    const em = themeDef(playTheme).emojis;
    return em[Math.floor(Math.random() * em.length)];
  }

  function randBetween(a, b) {
    return a + Math.random() * (b - a);
  }

  /** Background hue: Shapes keeps the original rainbow drift; other themes stay near their base so colors read clearly */
  function bumpThemeHue(mode) {
    if (playTheme === 'shapes') {
      if (mode === 'surprise') bgTargetHue = (bgTargetHue + randBetween(70, 150)) % 360;
      else if (mode === 'mouse') bgTargetHue = (bgTargetHue + 30) % 360;
      else bgTargetHue = (bgTargetHue + randBetween(20, 60)) % 360;
      return;
    }
    const base = themeDef(playTheme).bgHueBase;
    const spread = mode === 'surprise' ? 75 : mode === 'mouse' ? 38 : 50;
    bgTargetHue = (base + randBetween(-spread, spread) + 360) % 360;
  }

  // ─── Resize ─────────────────────────────────────────────
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  // ─── Entity types ───────────────────────────────────────

  // Floating letter
  function spawnLetter(key, x, y) {
    const size = randBetween(80, 200);
    const color = randColor();
    const vx = randBetween(-2, 2);
    const vy = randBetween(-3, -1);
    const rotation = randBetween(-0.3, 0.3);
    let rot = randBetween(0, Math.PI * 2);
    let life = 1;
    const decay = randBetween(0.008, 0.015);
    const display = key.length === 1 ? key.toUpperCase() : '?';

    if (!playSettings.enhancedPhysics) {
      entities.push({
        update() {
          x += vx;
          y += vy;
          rot += rotation;
          life -= decay;
          return life > 0;
        },
        draw() {
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(rot);
          ctx.globalAlpha = life;
          ctx.font = `bold ${size}px 'Comic Sans MS', sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = size * 0.06;
          ctx.strokeText(display, 0, 0);
          ctx.fillStyle = color;
          ctx.fillText(display, 0, 0);
          ctx.restore();
        }
      });
      return;
    }

    const vx0 = randBetween(-8, 8);
    const vy0 = randBetween(-8, 8);
    const body = {
      x, y, vx: vx0, vy: vy0, life, decay, size, color, display,
      r: size * 0.45
    };

    entities.push({
      _collide: true,
      body,
      update() {
        body.vy += 0.038;
        body.x += body.vx;
        body.y += body.vy;
        if (body.x < body.r) { body.x = body.r; body.vx *= -0.93; }
        if (body.x > W - body.r) { body.x = W - body.r; body.vx *= -0.93; }
        if (body.y < body.r) { body.y = body.r; body.vy *= -0.91; }
        if (body.y > H - body.r) { body.y = H - body.r; body.vy *= -0.91; }
        const sp = Math.hypot(body.vx, body.vy);
        const vmax = 20;
        if (sp > vmax) {
          body.vx *= vmax / sp;
          body.vy *= vmax / sp;
        }
        body.life -= body.decay;
        return body.life > 0;
      },
      draw() {
        const b = body;
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.globalAlpha = b.life;
        ctx.font = `bold ${b.size}px 'Comic Sans MS', sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = b.size * 0.06;
        ctx.strokeText(b.display, 0, 0);
        ctx.fillStyle = b.color;
        ctx.fillText(b.display, 0, 0);
        ctx.restore();
      }
    });
  }
